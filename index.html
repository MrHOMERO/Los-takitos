<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Camino del Tiempo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Capa inicial de acceso */
        #capa-acceso {
            position: absolute; width: 100%; height: 100%; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }

        #btn-acceder {
            padding: 20px 40px; font-size: 1.5rem; color: #FFD700;
            background: rgba(0,0,0,0.5); border: 2px solid #FFD700;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            animation: tintinear 2s infinite ease-in-out;
            font-family: 'Courier New', monospace;
        }

        /* Estilos del video */
        #video-intro {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
        }

        @keyframes tintinear {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #FFD700; }
            50% { opacity: 0.7; box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="capa-acceso">
        <button id="btn-acceder" onclick="comenzarExperiencia()">ACCEDER AL JUEGO</button>
    </div>

    <video id="video-intro" playsinline webkit-playsinline>
        <source src="https://github.com/MrHOMERO/Los-takitos/raw/e2768393cc7ac3aec89ffc38dcdaf1bc5f014a59/lv_0_20260703030142.mp4" type="video/mp4">
    </video>

    <script src="juego.js"></script>

    <script>
        function comenzarExperiencia() {
            // Inicia música global si existe en juego.js
            if (typeof inicializarMusica === 'function') inicializarMusica();
            
            // Oculta la pantalla inicial y muestra el video
            document.getElementById('capa-acceso').style.display = 'none';
            const video = document.getElementById('video-intro');
            video.style.display = 'block';
            video.play();
        }

        // Redirección automática al terminar el video
        document.getElementById('video-intro').addEventListener('ended', function() {
            window.location.href = 'pantalla2.html';
        });
    </script>
</body>
</html>
