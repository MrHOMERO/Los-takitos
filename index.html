<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Tiempo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            /* Enlace directo a tu imagen en GitHub */
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/portada.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }

        .start-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            border: 3px solid #c5a059;
            cursor: pointer;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(197, 160, 89, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <button class="start-button" onclick="alert('El viaje ha comenzado...');">Comenzar el Viaje</button>
    </div>

</body>
</html>
