<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Camino del Tiempo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        #capa-acceso {
            position: absolute; width: 100%; height: 100%; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }

        #btn-acceder {
            padding: 20px 40px; font-size: 1.5rem; color: #FFD700;
            background: rgba(0,0,0,0.5); border: 2px solid #FFD700;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            animation: tintinear 2s infinite ease-in-out;
            font-family: 'Courier New', monospace;
        }

        #video-intro {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Asegura que llene toda la pantalla */
            z-index: 10;
            display: none;
        }

        @keyframes tintinear {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #FFD700; }
            50% { opacity: 0.7; box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="capa-acceso">
        <button id="btn-acceder" onclick="comenzarExperiencia()">ACCEDER AL JUEGO</button>
    </div>

    <video id="video-intro" playsinline webkit-playsinline>
        <source src="https://github.com/MrHOMERO/Los-takitos/raw/f9f0b828106e201e30ce9674328f98c14e83c026/lv_0_20260701185600.mp4" type="video/mp4">
    </video>

    <script src="juego.js"></script>

    <script>
        function comenzarExperiencia() {
            const capaAcceso = document.getElementById('capa-acceso');
            const video = document.getElementById('video-intro');

            // 1. Inicia música global si existe en juego.js
            if (typeof inicializarMusica === 'function') inicializarMusica();
            
            // 2. Transición visual
            capaAcceso.style.display = 'none';
            video.style.display = 'block';
            
            // 3. Reproducción (la promesa maneja errores de auto-play)
            video.play().catch(error => {
                console.log("Error al reproducir video, intentando de nuevo...");
            });
        }

        // 4. Redirección automática al finalizar
        document.getElementById('video-intro').addEventListener('ended', function() {
            window.location.href = 'pantalla1.html';
        });
    </script>
</body>
</html>
