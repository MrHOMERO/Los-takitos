<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Tiempo</title>
    <link href="https://fonts.googleapis.com/css2?family=Ewert&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-espacio"></div>
    <audio id="musica-fondo" src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/Audio%20pantalla%202.mp3"></audio>

    <div id="pantalla-1" class="pantalla activa">
        <h1 class="titulo-dorado">EL CAMINO DEL TIEMPO</h1>
        <video autoplay loop muted playsinline class="nave-video">
            <source src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/447c9412b17a4ec99c771f176605d8a7.mp4" type="video/mp4">
        </video>
        <button class="boton-jugar" onclick="iniciarJuego()">COMENZAR A JUGAR</button>
    </div>

    <div id="pantalla-2" class="pantalla">
        <div id="prologo">
            <p>"El tiempo es el único recurso que, una vez gastado, no puede recuperarse."</p><br>
            <p>Tú decides cómo habitar el mundo. ¿Serás esclavo del reloj o arquitecto de tu propia existencia?</p>
        </div>
    </div>

    <div id="pantalla-3" class="pantalla">
        <h2 class="titulo-dorado">Elige tu esencia</h2>
        <button class="boton-jugar" onclick="asignar('acumulador')">Monetizar</button>
        <button class="boton-jugar" onclick="asignar('guardian')">Proteger</button>
        <button class="boton-jugar" onclick="asignar('equilibrista')">Equilibrar</button>
    </div>

    <div id="pantalla-4" class="pantalla">
        <h2 class="titulo-dorado">Tu Ruta</h2>
        <input type="text" id="nombre-input" placeholder="Nombre..." class="input-nombre">
        <div id="mapa-evolucion" style="display:none;">
            <div class="mapa-ruta">
                <div class="punto activo" onclick="irAlNivel(1)">1</div>
                <div class="punto" onclick="irAlNivel(2)">2</div>
                <div class="punto" onclick="irAlNivel(3)">3</div>
                <div class="punto" onclick="irAlNivel(4)">4</div>
                <div class="punto" onclick="irAlNivel(5)">5</div>
                <div class="punto" onclick="irAlNivel(6)">6</div>
            </div>
        </div>
        <button id="btn-conf" class="boton-jugar" onclick="mostrarMapa()">CONFIRMAR</button>
    </div>

    <script>
        function cambiarPantalla(id) { document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa')); document.getElementById(id).classList.add('activa'); }
        function iniciarJuego() { document.getElementById('musica-fondo').play(); cambiarPantalla('pantalla-2'); setTimeout(() => cambiarPantalla('pantalla-3'), 20000); }
        function asignar(t) { localStorage.setItem('rol', t); cambiarPantalla('pantalla-4'); }
        function mostrarMapa() { if(!document.getElementById('nombre-input').value) return alert("Nombre?"); document.getElementById('mapa-evolucion').style.display='block'; document.getElementById('btn-conf').style.display='none'; }
        function irAlNivel(n) { alert("Iniciando nivel " + n); window.location.href = 'juego_principal.html'; }
    </script>
</body>
</html>
