<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Camino del Tiempo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Capa inicial */
        #capa-acceso {
            position: absolute; width: 100%; height: 100%; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }

        #btn-acceder {
            padding: 20px 40px; font-size: 1.5rem; color: #FFD700;
            background: rgba(0,0,0,0.5); border: 2px solid #FFD700;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            animation: tintinear 2s infinite ease-in-out;
            font-family: 'Courier New', monospace;
        }

        /* Video escondido */
        #video-intro {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

    <div id="capa-acceso">
        <button id="btn-acceder" onclick="comenzarExperiencia()">ACCEDER AL JUEGO</button>
    </div>

    <!-- El video DEBE tener el ID video-intro -->
    <video id="video-intro" playsinline>
        <source src="https://github.com/MrHOMERO/Los-takitos/raw/f9f0b828106e201e30ce9674328f98c14e83c026/lv_0_20260701185600.mp4" type="video/mp4">
    </video>

    <script src="juego.js"></script>

    <script>
        function comenzarExperiencia() {
            // 1. Iniciar música (definida en juego.js)
            if (typeof inicializarMusica === 'function') inicializarMusica();
            
            const capa = document.getElementById('capa-acceso');
            const video = document.getElementById('video-intro');

            // 2. Esconder el botón y mostrar el video
            capa.style.display = 'none';
            video.style.display = 'block';
            
            // 3. Forzar reproducción
            video.play();
        }

        // 4. Redirección automática al terminar
        document.getElementById('video-intro').addEventListener('ended', function() {
            // Aquí definimos la redirección a la pantalla 2
            window.location.href = 'pantalla2.html';
        });
    </script>
</body>
</html>
