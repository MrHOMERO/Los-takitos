<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Tiempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-espacio"></div>

    <!-- Pantalla 1: Intro -->
    <div id="pantalla-intro" class="pantalla activa">
        <div class="texto-intro">"El tiempo es el único recurso que, una vez gastado, no puede recuperarse."</div>
        <button class="boton-jugar" onclick="cambiarFase('seleccion')">COMENZAR A JUGAR</button>
    </div>

    <!-- Pantalla 2: Esencia -->
    <div id="pantalla-seleccion" class="pantalla">
        <h2 class="titulo-dorado">¿Serás esclavo del reloj o arquitecto de tu existencia?</h2>
        <button class="boton-jugar" onclick="elegirEsencia('MONETIZAR')">MONETIZAR</button>
        <button class="boton-jugar" onclick="elegirEsencia('PROTEGER')">PROTEGER</button>
        <button class="boton-jugar" onclick="elegirEsencia('EQUILIBRAR')">EQUILIBRAR</button>
    </div>

    <!-- Pantalla 3: Nombre y Personaje -->
    <div id="pantalla-nombre" class="pantalla">
        <h2 class="titulo-dorado">Identifícate</h2>
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/personaje1.jpg" class="personaje-animado">
        <input type="text" id="input-nombre" placeholder="Nombre...">
        <button class="boton-jugar" onclick="confirmarNombre()">COMENZAR A EXPLORAR</button>
    </div>

    <!-- Pantalla 4: Mapa -->
    <div id="pantalla-mapa" class="pantalla">
        <h2 class="titulo-dorado">TU RUTA</h2>
        <div class="mapa-caminos">
            <button class="punto" onclick="alert('Iniciando nivel 1')">1</button>
            <button class="punto">2</button>
            <button class="punto">3</button>
            <button class="punto">4</button>
            <button class="punto">5</button>
            <button class="punto">6</button>
        </div>
    </div>

    <script src="juego.js"></script>
</body>
</html>
