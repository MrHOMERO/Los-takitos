<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Camino del Tiempo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Capa inicial de acceso */
        #capa-acceso {
            position: absolute; width: 100%; height: 100%; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }

        #btn-acceder {
            padding: 15px 30px; font-size: 1.2rem; color: #FFD700;
            background: rgba(0,0,0,0.5); border: 2px solid #FFD700;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            animation: tintinear 2s infinite ease-in-out;
            white-space: nowrap; /* Evita que el texto se corte */
        }

        /* Ajuste de video para que no se corte */
        #video-intro {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; /* Cambiado a contain para evitar cortes en imágenes */
            background-color: #000;
            z-index: 10;
            display: none;
        }

        @keyframes tintinear {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #FFD700; }
            50% { opacity: 0.7; box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="capa-acceso">
        <button id="btn-acceder" onclick="comenzarExperiencia()">ACCEDER AL JUEGO</button>
    </div>

    <video id="video-intro" playsinline webkit-playsinline>
        <source src="https://github.com/MrHOMERO/Los-takitos/raw/e2768393cc7ac3aec89ffc38dcdaf1bc5f014a59/lv_0_20260703030142.mp4" type="video/mp4">
    </video>

    <audio id="musica-intro" src="https://github.com/MrHOMERO/Los-takitos/raw/cfa35cb9c92150f6720f032b7fd2612c5e6ec4f5/fondo%20del%20juego.mp3"></audio>

    <script>
        function comenzarExperiencia() {
            document.getElementById('capa-acceso').style.display = 'none';
            
            const video = document.getElementById('video-intro');
            const musica = document.getElementById('musica-intro');

            video.style.display = 'block';
            
            // Reproducir video y música
            video.play();
            musica.play();
            
            video.onended = function() {
                musica.pause();
                musica.currentTime = 0;
                window.location.href = 'pantalla2.html';
            };
        }
    </script>
</body>
</html>
