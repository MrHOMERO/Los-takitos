<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Huerta Rangers</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #1b5e20; font-family: 'Press Start 2P', cursive; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { display: none; text-align: center; width: 80%; }
        .active { display: block; animation: fadeIn 0.5s; }
        #logo { width: 150px; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; text-shadow: 4px 4px #000; }
        button { padding: 20px 40px; font-size: 1rem; background: #ffeb3b; border: 4px solid #f57f17; color: #d84315; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- Pantalla 1: Menú -->
    <div id="menu-screen" class="screen active">
        <img id="logo" src="https://cdn-icons-png.flaticon.com/512/628/628315.png" alt="Logo">
        <h1>HUERTA<br>RANGERS</h1>
        <button onclick="iniciarHistoria()">START GAME</button>
    </div>

    <!-- Pantalla 2: Historia -->
    <div id="story-screen" class="screen">
        <h2>EL DESPERTAR</h2>
        <p style="line-height: 1.6; font-size: 0.8rem;">La energía cósmica despertó a la huerta. Los 'Marchitos' han llegado para secarlo todo. ¡Tú debes guiar a los héroes!</p>
        <button onclick="alert('¡A luchar!')">CONTINUAR</button>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        function iniciarHistoria() {
            document.getElementById('clickSound').play();
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('story-screen').classList.add('active');
        }
    </script>
</body>
</html>
