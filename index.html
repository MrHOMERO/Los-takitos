<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción - El Camino del Tiempo</title>
    <style>
        /* Estilos específicos para que el video ocupe toda la pantalla */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
        #video-intro {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover; /* Asegura que no queden bordes negros */
            z-index: 1;
        }
        #btn-saltar {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            color: #FFD700;
            border: 1px solid #FFD700;
            padding: 10px 20px;
            cursor: pointer;
            font-family: sans-serif;
            border-radius: 5px;
            transition: 0.3s;
        }
        #btn-saltar:hover { background: #FFD700; color: #000; }
    </style>
</head>
<body>
    <!-- NOTA: Está en 'muted' (silenciado) porque los navegadores bloquean el autoplay con sonido. -->
    <video id="video-intro" autoplay muted playsinline>
        <source src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/fdd1daaa80ac4bae9788186c6b962374.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <!-- Botón opcional para saltar el video -->
    <button id="btn-saltar" onclick="saltarIntro()">Saltar Intro ➦</button>

    <script>
        const video = document.getElementById('video-intro');

        // Evento: Cuando el video termine, pasa automáticamente a la pantalla 1
        video.onended = function() {
            window.location.href = 'pantalla1.html';
        };

        // Función del botón saltar
        function saltarIntro() {
            window.location.href = 'pantalla1.html';
        }
    </script>
</body>
</html>
