<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>El Camino del Tiempo</title>
</head>
<body>
    <div class="fondo-espacio"></div>

    <div id="pantalla-1" class="pantalla activa">
        <!-- Video de la nave -->
        <video class="nave-video" autoplay loop muted playsinline>
            <source src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/447c9412b17a4ec99c771f176605d8a7.mp4" type="video/mp4">
        </video>
        
        <!-- Contenedor que oculta la marca de agua -->
        <div class="contenedor-interfaz">
            <h1>EL CAMINO DEL TIEMPO</h1>
            <button onclick="cambiarPantalla('pantalla-1', 'pantalla-2')">COMENZAR JUEGO</button>
        </div>
    </div>

    <div id="pantalla-2" class="pantalla">
        <div class="texto-historia">Todo comenzó...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
