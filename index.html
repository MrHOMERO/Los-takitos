<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Takitos | Sabor que Encanta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-principal: #f48fb1; /* El rosa de tu logo */
            --turquesa: #4dd0e1;      /* El turquesa de tu logo */
            --crema: #fff9c4;          /* Color de fondo suave */
            --oscuro: #455a64;
            --blanco: #ffffff;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: #fffafb;
            color: var(--oscuro);
        }

        /* HEADER Y LOGO */
        .navbar {
            background: var(--blanco);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img {
            height: 110px; /* Ajuste para que luzca profesional */
            width: auto;
        }

        /* SECCIÓN HERO (Bienvenida) */
        .hero {
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('https://i.ibb.co/J6hX1rb/WA-1778028518945.png');
            background-size: cover;
            background-position: center;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 6px dashed var(--rosa-principal);
        }

        .hero h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            color: #d81b60;
            margin: 0;
            text-shadow: 2px 2px 0px var(--blanco);
        }

        /* CONTENEDOR DE PRODUCTOS */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .product-card {
            background: var(--blanco);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-bottom: 60px;
            border: 3px solid var(--turquesa);
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.02);
        }

        .product-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .product-info {
            padding: 40px;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff, #fff4f7);
        }

        .product-info h2 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #d81b60;
            margin-bottom: 15px;
        }

        .product-info p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #546e7a;
            max-width: 700px;
            margin: 0 auto 25px;
        }

        .price-badge {
            display: inline-block;
            background: var(--turquesa);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(77, 208, 225, 0.3);
        }

        /* WHATSAPP FLOTANTE */
        .wa-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
        }

        .wa-btn {
            width: 65px;
            height: 65px;
            background: var(--whatsapp);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 35px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.3s;
        }

        .wa-card {
            width: 300px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            display: none;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .wa-card.active { display: block; animation: slideUp 0.3s ease; }

        .wa-header {
            background: var(--whatsapp);
            color: white;
            padding: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wa-body { padding: 25px; text-align: center; }

        .btn-wa-final {
            background: #d81b60;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            display: block;
            font-weight: bold;
            margin-top: 15px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FOOTER */
        footer {
            background: #fce4ec;
            padding: 60px 20px;
            text-align: center;
            border-top: 5px solid var(--turquesa);
        }

        footer p { margin: 10px 0; font-weight: bold; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .product-info h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="https://i.ibb.co/J6hX1rb/WA-1778028518945.png" alt="Logo Los Takitos" class="logo-img">
    </nav>

    <header class="hero">
        <h1>Sabor que Encanta</h1>
        <p>Los tacos más ricos y coloridos de todo Paysandú.</p>
    </header>

    <div class="container">
        
        <div class="product-card">
            <img src="https://i.ibb.co/J6hX1rb/WA-1778028518945.png" alt="Tacos de Carne" class="product-img">
            <div class="product-info">
                <h2>Tacos de Carne</h2>
                <p>Nuestra receta estrella. Carne seleccionada con el sazón auténtico de "Los Takitos", acompañada de vegetales frescos y nuestras salsas artesanales a elección.</p>
                <div class="price-badge">1/2 Docena: $540 | 1 Docena: $960</div>
            </div>
        </div>
