<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Tiempo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            background-color: #000;
        }

        /* Contenedor con la imagen de portada */
        #game-container {
            width: 100vw;
            height: 100vh;
            background-image: url('URL_DE_TU_PORTADA.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }

        /* Botón de inicio con efecto de pulso */
        .start-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            border: 3px solid #c5a059;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
            transition: 0.3s;
        }

        .start-button:hover {
            background-color: rgba(197, 160, 89, 0.3);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(197, 160, 89, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Botón para iniciar el juego y el sonido -->
        <button class="start-button" onclick="startGame()">Comenzar el Viaje</button>
    </div>

    <!-- Elemento de audio con efecto Tic-Tac -->
    <audio id="tick-tock-sound" loop>
        <source src="URL_DE_TU_SONIDO.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startGame() {
            const audio = document.getElementById('tick-tock-sound');
            audio.play();
            alert("El viaje a través del tiempo ha comenzado.");
            // Aquí puedes añadir la redirección a tu siguiente pantalla de juego
        }
    </script>
</body>
</html>
