<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bienvenido - El Camino del Tiempo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
        
        #fondo-blur {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            filter: blur(20px);
        }

        #btn-acceder {
            z-index: 2; padding: 20px 40px; font-size: 1.5rem; color: #FFD700;
            background: rgba(0,0,0,0.5); border: 2px solid #FFD700;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            animation: tintinear 2s infinite ease-in-out;
            font-family: 'Courier New', monospace;
        }

        @keyframes tintinear {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #FFD700; }
            50% { opacity: 0.7; box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="fondo-blur"></div>
    <button id="btn-acceder" onclick="iniciarYContinuar()">ACCEDER AL JUEGO</button>

    <script src="juego.js"></script>

    <script>
        function iniciarYContinuar() {
            // Inicia la música de juego.js
            if (typeof inicializarMusica === 'function') {
                inicializarMusica();
            }
            // Redirige a la pantalla que contiene el video
            // Debes asegurarte de que tu archivo de video se llame 'video_intro.html'
            window.location.href = 'video_intro.html';
        }
    </script>
</body>
</html>
