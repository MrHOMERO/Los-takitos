<!DOCTYPE html>
<html>
<head>
    <title>El Camino del Tiempo - Juego</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; color:#FFD700;">
    <div class="fondo-espacio"></div>
    <h1 id="mensaje-bienvenida">Cargando...</h1>

    <script>

    </script>
</body>
</html>
