<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego - El Camino del Tiempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-espacio"></div>

    <!-- Escenario 1: Exploración 360 -->
    <div id="fase-exploracion" class="fase activa">
        <h2 class="titulo-dorado">Busca al Guía</h2>
        <div id="vista-360"></div> <!-- Aquí cargaremos el entorno -->
    </div>

    <!-- Escenario 2: Persecución (Primera Persona) -->
    <div id="fase-persecucion" class="fase">
        <div id="ui-juego">
            <div class="barras-recoleccion">
                <div id="vida">Vida: 0/10</div>
                <div id="poder">Poder: 0/10</div>
                <div id="estrategia">Estrategia: 0/10</div>
            </div>
            <div id="contador">Tiempo: 30s</div>
        </div>
        <div id="area-carrera"></div>
    </div>

    <!-- Escenario 3: Duelo Final -->
    <div id="fase-duelo" class="fase">
        <h2 class="titulo-dorado">DUELO</h2>
        <div class="barras-vida-duelo">
            <progress id="vida-jugador" value="100" max="100"></progress>
            <progress id="vida-boss" value="100" max="100"></progress>
        </div>
    </div>

    <script src="juego.js"></script>
</body>
</html>
