<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        
        /* Contenedor total que mantiene la imagen de fondo */
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* La cabina se coloca como una capa encima */
        #cabina-capa {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        /* Ventana transparente en el centro */
        #visor-ventana {
            width: 45%; height: 30%;
            z-index: 5; overflow: hidden;
            display: flex; align-items: center;
        }

        #visor-espacial {
            display: flex; height: 100%; width: max-content;
            scroll-snap-type: x mandatory; overflow-x: auto;
            scrollbar-width: none;
        }
        #visor-espacial::-webkit-scrollbar { display: none; }

        .planeta-container { 
            display: flex; align-items: center; justify-content: center;
            width: 45vw; scroll-snap-align: center; 
        }

        .planeta-real {
            border-radius: 50%; background-size: 200% 100%;
            animation: rotarTextura 10s linear infinite;
            width: 70px; height: 70px;
        }
        @keyframes rotarTextura { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }

        .nav-btn {
            position: absolute; z-index: 20;
            background: rgba(255,255,255,0.2); color: white;
            padding: 15px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="cabina-capa"></div>
    
    <div class="nav-btn left-4" onclick="mover(-1)">◀</div>
    
    <div id="visor-ventana">
        <div id="visor-espacial">
            <div class="planeta-container"><div class="planeta-real" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/a7777371ce9124f981932f027fe09a1f51837899/picante.jpg');"></div></div>
            <div class="planeta-container"><div class="planeta-real" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/a7777371ce9124f981932f027fe09a1f51837899/maiz.jpg');"></div></div>
            <div class="planeta-container"><div class="planeta-real" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/a7777371ce9124f981932f027fe09a1f51837899/cilantro.jpg');"></div></div>
        </div>
    </div>

    <div class="nav-btn right-4" onclick="mover(1)">▶</div>
</div>

<script>
    function mover(dir) {
        const visor = document.getElementById('visor-espacial');
        visor.scrollBy({ left: dir * visor.offsetWidth, behavior: 'smooth' });
    }
</script>
</body>
</html>
