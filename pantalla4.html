<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Umbral del Velo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        #visor-mision {
            position: absolute;
            top: 15%; left: 10%;
            width: 80%; height: 60%;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFD700;
            padding: 20px;
            color: #FFD700;
            z-index: 5;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        #contenedor-animado {
            position: relative;
            width: 100%;
            animation: subirTexto 20s linear forwards;
        }

        @keyframes subirTexto {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        
        #btn-iniciar {
            padding: 15px 30px;
            background: #FFD700; color: black;
            font-weight: bold; border-radius: 10px;
            cursor: pointer; border: none;
            font-size: 1.1rem; text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>
<body onload="iniciarSecuencia()">

<div id="app">
    <div id="cabina-capa"></div>
    <div id="visor-mision">
        <div id="contenedor-animado">
            <div id="texto-mision" class="text-center leading-relaxed"></div>
            <div id="boton-contenedor" class="flex justify-center"></div>
        </div>
    </div>
</div>

<audio id="sonido-maquina" src="https://github.com/MrHOMERO/Los-takitos/raw/44aad3aa2eaf32eb35c15be17c5b59521247424f/sonido%20de%20teclado.mp3" preload="auto"></audio>

<script>
    const nombre = localStorage.getItem('nombre') || "VIAJERO";
    const esencia = localStorage.getItem('tipoElegido') || "sabiduria"; 
    
    const textosMision = {
        'sabiduria': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE BUSCA LA VERDAD, TU MISIÓN ES REPARAR LAS GRIETAS EN TUS SEIS MUNDOS. SI TU INTELECTO ES LO SUFICIENTEMENTE ELEVADO, PODRÁS ACCEDER A LOS MAPAS DE OTRAS ESENCIAS. PERO RECUERDA: LA BÚSQUEDA DE LA VERDAD TIENE UN PRECIO, Y AL FINAL, LA SABIDURÍA NO TE SALVARÁ DE SER PRISIONERO DEL TIEMPO.",
        'legado': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE CONSTRUYE PARA LA ETERNIDAD, TU MISIÓN ES REFORZAR EL NÚCLEO EN TUS SEIS MUNDOS. SI TU PODER ES SUFICIENTE, RECLAMARÁS LAS RUTAS HACIA OTROS DOMINIOS. SIN EMBARGO, NO TE ENGAÑES: CADA PIEDRA QUE COLOCAS EN TU LEGADO ES UN BARROTE MÁS EN TU CELDA TEMPORAL.",
        'momento': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE VIVE CON INTENSIDAD, TU MISIÓN ES RESTAURAR EL EQUILIBRIO EN TUS SEIS MUNDOS. SI TUS ATRIBUTOS SON LOS ADECUADOS, PODRÁS SALTAR HACIA REALIDADES AJENAS. DISFRUTA CADA SEGUNDO, PORQUE POR MÁS QUE CORRAS, EL TIEMPO TE DARÁ ALCANCE Y SERÁS SU PRISIONERO AL FINAL."
    };

    const misionSeleccionada = textosMision[esencia] || textosMision['sabiduria'];
    const textoCompleto = `IDENTIDAD: ${nombre.toUpperCase()}\nESENCIA: ${esencia.toUpperCase()}\n\n${misionSeleccionada}`;
    
    let i = 0;

    function iniciarSecuencia() {
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            document.getElementById("texto-mision").innerText += textoCompleto.charAt(i);
            i++;
            
            const sonido = document.getElementById('sonido-maquina');
            sonido.currentTime = 0;
            sonido.play().catch(() => {});
            
            setTimeout(escribir, 40);
        } else {
            // Detener el sonido al terminar la escritura
            const sonido = document.getElementById('sonido-maquina');
            sonido.pause();
            sonido.currentTime = 0;

            // Añadir el botón al terminar
            if (!document.getElementById('btn-iniciar')) {
                const btn = document.createElement("button");
                btn.innerHTML = "ACCEDER AL MAPA";
                btn.id = "btn-iniciar";
                btn.onclick = () => window.location.href = 'pantalla5.html';
                document.getElementById("boton-contenedor").appendChild(btn);
            }
        }
    }
</script>

</body>
</html>
