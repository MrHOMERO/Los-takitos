<script>
    // Recuperamos datos
    const nombre = localStorage.getItem('nombre') || "Viajero";
    const esencia = localStorage.getItem('esencia') || "Sabiduría";
    
    const textoCompleto = `IDENTIDAD VERIFICADA. SALUDOS, ${nombre.toUpperCase()}. EL ESPECTRO DE TU ESENCIA HA SIDO ANALIZADO: TU INCLINACIÓN POR LA ${esencia.toUpperCase()} HA DEJADO UNA FIRMA ÚNICA EN LOS REGISTROS DEL SECTOR. HAS SIDO CONVOCADO PARA UN PROPÓSITO MAYOR. EL MAPA DE CONOCIMIENTO SE HA DESBLOQUEADO. ES MOMENTO DE DESCIFRAR LAS VERDADES QUE LAS ESTRELLAS HAN GUARDADO CELOSAMENTE POR EONES.`;
    
    const duracionTotal = 20000; 
    const velocidad = duracionTotal / textoCompleto.length;
    let i = 0;

    function iniciarSecuencia() {
        const sonido = document.getElementById('sonido-maquina');
        sonido.play().catch(e => console.log("Audio esperando interacción"));
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            let char = textoCompleto.charAt(i);
            const contenedorTexto = document.getElementById("texto-mision");
            const visor = document.getElementById("visor-mision");
            
            contenedorTexto.innerHTML += (char === '\n' ? "<br>" : char);
            visor.scrollTop = visor.scrollHeight;
            
            i++;
            setTimeout(escribir, velocidad);
        } else {
            if (!document.getElementById('btn-iniciar')) {
                const btn = document.createElement("button");
                btn.innerHTML = "ACCEDER AL MAPA DE CONOCIMIENTO";
                btn.id = "btn-iniciar";
                btn.onclick = () => window.location.href = 'pantalla5.html';
                document.getElementById("visor-mision").appendChild(btn);
            }
        }
    }
</script> <!-- ¡ESTA ETIQUETA FALTABA Y CERRABA EL SCRIPT ANTERIOR! -->
