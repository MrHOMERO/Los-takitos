<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Takito-1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        /* Visor panorámico con auto-scroll */
        #visor-mision {
            position: absolute;
            top: 25%; left: 15%;
            width: 70%; height: 35%;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid cyan;
            padding: 25px;
            color: #0ff;
            z-index: 5;
            display: flex; flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            border-radius: 10px;
            overflow: auto; /* Permite el scroll */
        }

        #texto-mision { 
            font-size: 1rem; 
            line-height: 1.4;
            width: 100%;
        }
        
        #btn-iniciar {
            padding: 10px 30px;
            background: cyan; color: black;
            font-weight: bold; border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body onload="iniciarMision()">

<div id="app">
    <div id="cabina-capa"></div>
    
    <div id="visor-mision">
        <div id="texto-mision"></div>
        <!-- El botón aparece automáticamente al finalizar -->
    </div>
</div>

<!-- Sonido desde tu repositorio -->
<audio id="sonido-maquina" src="https://github.com/MrHOMERO/Los-takitos/raw/44aad3aa2eaf32eb35c15be17c5b59521247424f/sonido%20de%20teclado.mp3" preload="auto"></audio>

<script>
    const textoCompleto = "SISTEMA INICIADO: NAVE 'TAKITO-1'\n\nUBICACIÓN: SECTOR 7-B\nOBJETIVO: PIKANTE-PRIME\nSITUACIÓN: FALLA EN RED DE RIEGO\n\nAVISO: LAS RESERVAS DE ESPECIAS ESTÁN AL 15%. CONTACTAR AL COCINERO SAL-7 DE INMEDIATO. LA COSECHA DEPENDE DE TU VELOCIDAD. ¡BUENA SUERTE, PILOTO!";
    let i = 0;

    function iniciarMision() {
        const sonido = document.getElementById('sonido-maquina');
        sonido.play().catch(e => console.log("Audio esperando interacción"));
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            let char = textoCompleto.charAt(i);
            const contenedorTexto = document.getElementById("texto-mision");
            const visor = document.getElementById("visor-mision");
            
            contenedorTexto.innerHTML += (char === '\n' ? "<br>" : char);
            
            // Auto-scroll activo
            visor.scrollTop = visor.scrollHeight;
            
            i++;
            setTimeout(escribir, 40);
        } else {
            // Inyectar botón cuando termina el texto
            if (!document.getElementById('btn-iniciar')) {
                const btn = document.createElement("button");
                btn.innerHTML = "COMENZAR MISIÓN";
                btn.id = "btn-iniciar";
                btn.onclick = iniciarNavegacion;
                document.getElementById("visor-mision").appendChild(btn);
                
                // Scroll final para asegurar que el botón sea visible
                document.getElementById("visor-mision").scrollTop = document.getElementById("visor-mision").scrollHeight;
            }
        }
    }

    function iniciarNavegacion() {
        // Redirige a la siguiente pantalla
        window.location.href = 'pantalla5.html'; 
    }
</script>
</body>
</html>
