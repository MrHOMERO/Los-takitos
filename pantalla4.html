<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Umbral del Velo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        /* Visor panorámico con estilo dorado */
        #visor-mision {
            position: absolute;
            top: 25%; left: 15%;
            width: 70%; height: 35%;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #FFD700;
            padding: 25px;
            color: #FFD700;
            z-index: 5;
            display: flex; flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            border-radius: 10px;
            overflow: auto;
        }

        #texto-mision { font-size: 1rem; line-height: 1.4; width: 100%; }
        
        #btn-iniciar {
            padding: 10px 30px;
            background: #FFD700; color: black;
            font-weight: bold; border-radius: 5px;
            cursor: pointer; margin-top: 15px; border: none;
        }
    </style>
</head>
<body onload="iniciarSecuencia()">

<div id="app">
    <div id="cabina-capa"></div>
    
    <div id="visor-mision">
        <div id="texto-mision"></div>
    </div>
</div>

<audio id="sonido-maquina" src="https://github.com/MrHOMERO/Los-takitos/raw/44aad3aa2eaf32eb35c15be17c5b59521247424f/sonido%20de%20teclado.mp3" preload="auto"></audio>

<script>
    // Recuperamos datos con fallback
    const nombre = localStorage.getItem('nombre') || "Viajero";
    const esencia = localStorage.getItem('esencia') || "Sabiduría";
    
    const textoCompleto = `IDENTIDAD VERIFICADA. SALUDOS, ${nombre.toUpperCase()}. EL ESPECTRO DE TU ESENCIA HA SIDO ANALIZADO: TU INCLINACIÓN POR LA ${esencia.toUpperCase()} HA DEJADO UNA FIRMA ÚNICA EN LOS REGISTROS DEL SECTOR. HAS SIDO CONVOCADO PARA UN PROPÓSITO MAYOR. EL MAPA DE CONOCIMIENTO SE HA DESBLOQUEADO. ES MOMENTO DE DESCIFRAR LAS VERDADES QUE LAS ESTRELLAS HAN GUARDADO CELOSAMENTE POR EONES.`;
    
    // Cálculo para que dure 20 segundos exactos (20000ms)
    const duracionTotal = 20000; 
    const velocidad = duracionTotal / textoCompleto.length;

    let i = 0;

    function iniciarSecuencia() {
        const sonido = document.getElementById('sonido-maquina');
        // Intentar reproducir sonido al cargar
        sonido.play().catch(e => console.log("Audio esperando interacción del usuario"));
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            let char = textoCompleto.charAt(i);
            const contenedorTexto = document.getElementById("texto-mision");
            const visor = document.getElementById("visor-mision");
            
            contenedorTexto.innerHTML += (char === '\n' ? "<br>" : char);
            visor.scrollTop = visor.scrollHeight;
            
            i++;
            setTimeout(escribir, velocidad);
        } else {
            // Inyectar botón cuando termina el texto
            if (!document.getElementById('btn-iniciar')) {
                const btn = document.createElement("button");
                btn.innerHTML = "ACCEDER AL MAPA DE CONOCIMIENTO";
                btn.id = "btn-iniciar";
                btn.onclick = () => window.location.href = 'pantalla5.html';
                document.getElementById("visor-mision").appendChild(btn);
            }
        }
    }
<script src="juego.js"></script>
</body>
</html>
