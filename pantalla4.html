<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Umbral del Velo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        #visor-mision {
            position: absolute;
            top: 15%; left: 10%;
            width: 80%; height: 60%;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFD700;
            padding: 20px;
            color: #FFD700;
            z-index: 5;
            display: flex; flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        #texto-mision { font-size: 1.1rem; line-height: 1.6; width: 100%; overflow-y: auto; }
        
        #btn-iniciar {
            padding: 15px 30px;
            background: #FFD700; color: black;
            font-weight: bold; border-radius: 10px;
            cursor: pointer; margin-top: 20px; border: none;
            font-size: 1.1rem; text-transform: uppercase;
        }
    </style>
</head>
<body onload="iniciarSecuencia()">

<div id="app">
    <div id="cabina-capa"></div>
    
    <div id="visor-mision">
        <div id="texto-mision"></div>
    </div>
</div>

<audio id="sonido-maquina" src="https://github.com/MrHOMERO/Los-takitos/raw/44aad3aa2eaf32eb35c15be17c5b59521247424f/sonido%20de%20teclado.mp3" preload="auto"></audio>

<script>
    // 1. Datos del jugador
    const nombre = localStorage.getItem('nombre') || "VIAJERO";
    const esencia = localStorage.getItem('esencia') || "SABIDURÍA";
    
    // 2. Textos concatenados
    const intro = `IDENTIDAD VERIFICADA. SALUDOS, ${nombre.toUpperCase()}. EL ESPECTRO DE TU ESENCIA HA SIDO ANALIZADO: TU INCLINACIÓN POR LA ${esencia.toUpperCase()} HA DEJADO UNA FIRMA ÚNICA EN LOS REGISTROS DEL SECTOR. `;
    const mision = `MISIÓN ACTUAL: EL TIEMPO SE HA FRACTURADO EN ESTE SECTOR. DEBES LOCALIZAR EL NÚCLEO DE ESTABILIZACIÓN Y REPARAR LA GRIETA ANTES DE QUE LA PARADOJA SE VUELVA PERMANENTE. EL MAPA DE CONOCIMIENTO SE HA DESBLOQUEADO PARA GUIARTE. ES MOMENTO DE DESCIFRAR LAS VERDADES QUE LAS ESTRELLAS HAN GUARDADO CELOSAMENTE POR EONES.`;
    
    const textoCompleto = intro + mision;
    const velocidad = 50; 
    let i = 0;

    function iniciarSecuencia() {
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            document.getElementById("texto-mision").innerHTML += textoCompleto.charAt(i);
            i++;
            
            // Efecto de sonido de tecleo
            const sonido = document.getElementById('sonido-maquina');
            sonido.currentTime = 0;
            sonido.play().catch(() => {});
            
            setTimeout(escribir, velocidad);
        } else {
            // Cuando termina la escritura, añade el botón
            if (!document.getElementById('btn-iniciar')) {
                const btn = document.createElement("button");
                btn.innerHTML = "ACCEDER AL MAPA";
                btn.id = "btn-iniciar";
                btn.onclick = () => window.location.href = 'pantalla5.html';
                document.getElementById("visor-mision").appendChild(btn);
            }
        }
    }
</script>

<script src="juego.js"></script>

</body>
</html>
