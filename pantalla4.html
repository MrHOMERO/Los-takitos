<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Umbral del Velo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #app { width: 100vw; height: 100vh; background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        #cabina-capa { position: absolute; width: 100%; height: 100%; background-image: url('watermarked_img_5533350620813538015.png'); background-size: cover; pointer-events: none; }
        
        #visor-mision {
            position: absolute; width: 80%; height: 60%; background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFD700; padding: 20px; color: #FFD700; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); overflow: hidden;
        }

        #texto-mision { font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; }

        #btn-iniciar {
            padding: 20px 40px; background: transparent; border: 2px solid #FFD700;
            color: #FFD700; font-weight: bold; border-radius: 10px; cursor: pointer;
            text-transform: uppercase; font-size: 1.5rem; text-shadow: 0 0 10px #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); animation: brillar 1.5s infinite alternate;
        }
        @keyframes brillar { from { box-shadow: 0 0 10px #FFD700; } to { box-shadow: 0 0 30px #FFD700; } }
    </style>
</head>
<body onload="iniciarSecuencia()">

<div id="app">
    <div id="cabina-capa"></div>
    <div id="visor-mision" class="flex flex-col items-center justify-center">
        <div id="texto-mision" class="w-full h-full overflow-hidden"></div>
    </div>
</div>

<audio id="sonido-maquina" src="https://github.com/MrHOMERO/Los-takitos/raw/44aad3aa2eaf32eb35c15be17c5b59521247424f/sonido%20de%20teclado.mp3" preload="auto"></audio>

<script>
    const nombre = localStorage.getItem('nombre') || "VIAJERO";
    const esencia = localStorage.getItem('tipoElegido') || "sabiduria";
    const visor = document.getElementById("texto-mision");
    const audio = document.getElementById('sonido-maquina');

    const textosMision = {
        'sabiduria': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE BUSCA LA VERDAD, TU MISIÓN ES REPARAR LAS GRIETAS EN TUS SEIS MUNDOS. SI TU INTELECTO ES LO SUFICIENTEMENTE ELEVADO, PODRÁS ACCEDER A LOS MAPAS DE OTRAS ESENCIAS. PERO RECUERDA: LA BÚSQUEDA DE LA VERDAD TIENE UN PRECIO, Y AL FINAL, LA SABIDURÍA NO TE SALVARÁ DE SER PRISIONERO DEL TIEMPO.",
        'legado': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE CONSTRUYE PARA LA ETERNIDAD, TU MISIÓN ES REFORZAR EL NÚCLEO EN TUS SEIS MUNDOS. SI TU PODER ES SUFICIENTE, RECLAMARÁS LAS RUTAS HACIA OTROS DOMINIOS. SIN EMBARGO, NO TE ENGAÑES: CADA PIEDRA QUE COLOCAS EN TU LEGADO ES UN BARROTE MÁS EN TU CELDA TEMPORAL.",
        'momento': "EL TIEMPO SE HA FRACTURADO. COMO AQUEL QUE VIVE CON INTENSIDAD, TU MISIÓN ES RESTAURAR EL EQUILIBRIO EN TUS SEIS MUNDOS. SI TUS ATRIBUTOS SON LOS ADECUADOS, PODRÁS SALTAR HACIA REALIDADES AJENAS. DISFRUTA CADA SEGUNDO, PORQUE POR MÁS QUE CORRAS, EL TIEMPO TE DARÁ ALCANCE Y SERÁS SU PRISIONERO AL FINAL."
    };

    const textoCompleto = `IDENTIDAD: ${nombre.toUpperCase()}\nESENCIA: ${esencia.toUpperCase()}\n\n${textosMision[esencia]}`;
    let i = 0;

    function iniciarSecuencia() {
        escribir();
    }

    function escribir() {
        if (i < textoCompleto.length) {
            visor.innerText += textoCompleto.charAt(i);
            i++;
            
            // Scroll automático
            visor.scrollTop = visor.scrollHeight;
            
            // Sonido
            audio.currentTime = 0;
            audio.play().catch(() => {});
            
            // Ajuste de velocidad para durar 20 segundos
            setTimeout(escribir, 85); 
        } else {
            // Borrar todo y mostrar botón brillante
            setTimeout(() => {
                visor.innerHTML = "";
                const btn = document.createElement("button");
                btn.innerHTML = "ACCEDER AL MAPA";
                btn.id = "btn-iniciar";
                btn.onclick = () => window.location.href = 'pantalla5.html';
                visor.appendChild(btn);
                visor.classList.replace("items-start", "items-center");
            }, 1000);
        }
    }
</script>

</body>
</html>
