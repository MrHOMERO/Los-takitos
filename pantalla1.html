<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Tiempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-espacio"></div>

    <div id="pantalla-intro" class="pantalla activa">
        <h1 class="titulo-juego">EL CAMINO DEL TIEMPO</h1>
        
        <div class="contenedor-nave">
            <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/naveportada.png" class="nave-animada" alt="Nave">
        </div>
        
        <div class="texto-intro">"El tiempo es el único recurso que, una vez gastado, no puede recuperarse."</div>
        
        <!-- Cambiamos el link directo por un botón que inicia la música -->
        <button onclick="iniciarYRedirigir()" class="boton-jugar">COMENZAR A JUGAR</button>
    </div>

    <!-- Script de lógica de juego y audio -->
    <script src="juego.js"></script>

    <script>
        function iniciarYRedirigir() {
            // Inicializa la música desde juego.js
            if (typeof inicializarMusica === 'function') {
                inicializarMusica();
            }
            // Redirige a la pantalla 2
            window.location.href = 'pantalla2.html';
        }
    <script src="juego.js"></script>
</body>
</html>
