<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento de Habilidades</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; text-align: center; }
        .barra-container { width: 60px; height: 200px; background: #222; margin: 10px; border-radius: 5px; cursor: pointer; position: relative; overflow: hidden; display: inline-block; }
        .barra-progreso { position: absolute; bottom: 0; width: 100%; height: 0%; background: #00FFFF; }
        #pantalla-juego { display: none; }
        #info { margin-top: 20px; color: #FFD700; }
    </style>
</head>
<body>

    <!-- Briefing -->
    <div id="briefing">
        <h2>Entrenamiento de Ecos</h2>
        <p>Selecciona una habilidad. Tienes 10 segundos para cargarla al máximo. Solo puedes entrenar cada una una vez.</p>
        <button onclick="iniciarEntrenamiento()">COMENZAR</button>
    </div>

    <!-- Juego -->
    <div id="pantalla-juego">
        <div id="info">Selecciona una barra para empezar:</div>
        <div id="contenedor-habilidades">
            <div class="barra-container" onclick="seleccionarBarra(0)"><div class="barra-progreso" id="b0"></div></div>
            <div class="barra-container" onclick="seleccionarBarra(1)"><div class="barra-progreso" id="b1"></div></div>
            <div class="barra-container" onclick="seleccionarBarra(2)"><div class="barra-progreso" id="b2"></div></div>
        </div>
        <h3 id="timer">Selecciona una habilidad</h3>
    </div>

    <script>
        let niveles = [0, 0, 0]; // Valores de las 3 habilidades
        let usadas = [false, false, false];
        let barraActiva = -1;
        let toques = 0;

        function seleccionarBarra(index) {
            if (usadas[index] || barraActiva !== -1) return;
            barraActiva = index;
            toques = 0;
            let tiempo = 10;
            document.getElementById('timer').innerText = "¡TOCA RÁPIDO! Tiempo: " + tiempo;
            
            let crono = setInterval(() => {
                tiempo--;
                document.getElementById('timer').innerText = "Tiempo restante: " + tiempo;
                if (tiempo <= 0) {
                    clearInterval(crono);
                    finalizarBarra();
                }
            }, 1000);
        }

        function registrarToque() {
            if (barraActiva === -1) return;
            toques++;
            niveles[barraActiva] = Math.min(toques * 1.5, 100); // 1.5% por toque
            document.getElementById('b' + barraActiva).style.height = niveles[barraActiva] + "%";
        }

        function finalizarBarra() {
            usadas[barraActiva] = true;
            barraActiva = -1;
            if (usadas.every(u => u)) {
                mostrarResultadoFinal();
            } else {
                document.getElementById('timer').innerText = "Habilidad cargada. Selecciona la siguiente.";
            }
        }

        // Detecta toques en todo el body cuando hay una barra activa
        document.body.onclick = (e) => {
            if (barraActiva !== -1 && e.target.className !== 'barra-container') registrarToque();
        };

        function mostrarResultadoFinal() {
            // Aquí redirigimos a una pantalla con la tarjeta actualizada
            localStorage.setItem('nivelesFinales', JSON.stringify(niveles));
            window.location.href = 'resultado_tarjeta.html';
        }
    </script>
</body>
</html>
