<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: Entrenamiento</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/06e012f27cc8a6a49e529252620b5c76e1b1edfb/extensi%C3%B3n%20izquierda%20picante%20prime.jpg'); background-size: cover; background-position: center; touch-action: manipulation; }

        /* Estilo Tarjeta */
        #tarjeta-usuario { border: 3px solid #FFD700; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.8); margin-top: 20px; width: 280px; text-align: center; }
        #img-personaje { width: 150px; height: 150px; background: url('https://github.com/MrHOMERO/Los-takitos/raw/06e012f27cc8a6a49e529252620b5c76e1b1edfb/retouch_2026063003370289.png'); background-size: contain; background-repeat: no-repeat; margin: 0 auto; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; color: #FFD700; font-weight: bold; }

        #dialogo-mision { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 350px; padding: 25px; background: rgba(0, 0, 0, 0.9); border: 3px solid #FFD700; color: #FFD700; text-align: center; border-radius: 15px; z-index: 100; }
        #contenedor-barras { display: flex; gap: 20px; margin-top: auto; margin-bottom: 50px; }
        .barra-caja { width: 60px; height: 120px; background: rgba(0,0,0,0.7); border: 2px solid #00FFFF; position: relative; cursor: pointer; }
        .barra-progreso { position: absolute; bottom: 0; width: 100%; height: 0%; background: #00FFFF; transition: height 0.1s; }
        .nombre-habilidad { position: absolute; bottom: -35px; width: 100%; text-align: center; font-size: 0.6rem; color: #FFD700; text-transform: uppercase; }
        #reloj-central { position: fixed; top: 50%; font-size: 5rem; color: #FFD700; display: none; z-index: 200; }
    </style>
</head>
<body>

    <audio id="musica-mision" loop><source src="https://github.com/MrHOMERO/Los-takitos/raw/5ccbc797e782bc7c36acefb6d47a7c877ca62fe8/musicafondomapa.mp3" type="audio/mpeg"></audio>

    <div id="tarjeta-usuario">
        <div id="img-personaje"></div>
        <h2 id="display-nombre">VIAJERO</h2>
        <div class="stats-row">
            <div>SAB<br><span id="val-sab">0</span></div>
            <div>INT<br><span id="val-int">0</span></div>
            <div>POD<br><span id="val-pod">0</span></div>
        </div>
    </div>

    <div id="dialogo-mision">
        <h2>INICIO DE MISIÓN</h2>
        <p>Entrena para mejorar tus atributos. Tienes 10 segundos por esencia.</p>
        <button onclick="cerrarDialogo()">ACEPTAR</button>
    </div>

    <div id="reloj-central"></div>

    <div id="contenedor-barras">
        <div class="barra-caja" onclick="iniciarSecuencia(0)"><div class="barra-progreso" id="b0"></div><div class="nombre-habilidad">SABIDURÍA</div></div>
        <div class="barra-caja" onclick="iniciarSecuencia(1)"><div class="barra-progreso" id="b1"></div><div class="nombre-habilidad">INTELIGENCIA</div></div>
        <div class="barra-caja" onclick="iniciarSecuencia(2)"><div class="barra-progreso" id="b2"></div><div class="nombre-habilidad">PODER</div></div>
    </div>

    <script>
        window.onload = () => {
            const stats = JSON.parse(localStorage.getItem('statsPersonaje')) || { sabiduria: 0, inteligencia: 0, poder: 0 };
            document.getElementById('val-sab').innerText = stats.sabiduria;
            document.getElementById('val-int').innerText = stats.inteligencia;
            document.getElementById('val-pod').innerText = stats.poder;
            document.getElementById('display-nombre').innerText = localStorage.getItem('nombreViajero') || "VIAJERO";
        };

        // ... (resto de tu lógica de juego anterior)
    </script>
</body>
</html>
