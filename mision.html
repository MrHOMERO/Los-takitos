<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafío: Incursión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #FFF; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .barra-contenedor { width: 40%; height: 30px; background: #333; border: 3px solid #000; position: relative; }
        .barra-vida { height: 100%; width: 100%; transition: width 0.3s; }
        .nombre-luchador { position: absolute; top: -25px; font-weight: bold; text-transform: uppercase; color: #FFD700; }
        .tarjeta-info { background: #111; border: 1px solid #FFD700; padding: 10px; margin-bottom: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="pantalla-mision" class="h-screen flex flex-col items-center justify-center p-5">
    <!-- Tarjeta de Personaje -->
    <div id="tarjeta-personaje" class="tarjeta-info w-[90%] text-center">
        <strong>PERSONAJE:</strong> <span id="val-nombre"></span> | 
        <strong>STATS:</strong> <span id="val-stats"></span>
    </div>

    <!-- Interacción (Fase 1) -->
    <div id="interaccion-zona" class="text-center">
        <h2 class="text-xl text-yellow-500 mb-5">PREPARANDO INCURSIÓN</h2>
        <button onclick="completarInteraccion(90)" class="bg-yellow-500 text-black px-8 py-4 font-bold rounded">INICIAR ESCANEO</button>
    </div>

    <!-- Combate (Fase 2) -->
    <div id="combate-zona" class="hidden w-full flex flex-col items-center">
        <div class="flex justify-between w-[90%] mb-10">
            <div class="barra-contenedor"><div id="nombre-jugador" class="nombre-luchador left-0"></div><div id="barra-jugador" class="barra-vida bg-yellow-500"></div></div>
            <div class="barra-contenedor"><div id="nombre-enemigo" class="nombre-luchador right-0"></div><div id="barra-enemigo" class="barra-vida bg-red-600"></div></div>
        </div>
        <div id="habilidades-container" class="w-full flex flex-col items-center"></div>
    </div>
</div>

<script>
    // Carga de datos
    const nombre = localStorage.getItem('nombre') || "VIAJERO";
    const esencia = localStorage.getItem('tipoElegido') || "sabiduria";
    const tenienteNombre = localStorage.getItem('tenienteActual') || "ENEMIGO";
    let stats = JSON.parse(localStorage.getItem('stats')) || {sabiduria: 5, poder: 5, momento: 5};
    
    // UI Inicial
    document.getElementById('val-nombre').innerText = nombre;
    document.getElementById('val-stats').innerText = `S:${stats.sabiduria} P:${stats.poder} M:${stats.momento}`;
    document.getElementById('nombre-jugador').innerText = nombre;
    document.getElementById('nombre-enemigo').innerText = tenienteNombre;

    const habilidades = {
        'sabiduria': ['PULSO LÓGICO', 'ANÁLISIS DE FALLO', 'ESCUDO DE DATOS'],
        'legado': ['GOLPE DE PIEDRA', 'ESTRUCTURA ETERNA', 'MURALLA DE TIEMPO'],
        'momento': ['CHISPA FUGAZ', 'SALTO TEMPORAL', 'REFLEJO INSTANTÁNEO']
    };

    let vidaJugador = 100;
    let vidaEnemigo = 100;
    let multiplicadorDano = 1.0;

    function completarInteraccion(efectividad) {
        multiplicadorDano = efectividad >= 80 ? 1.5 : 1.0;
        document.getElementById('interaccion-zona').classList.add('hidden');
        document.getElementById('combate-zona').classList.remove('hidden');
        cargarHabilidades();
    }

    function cargarHabilidades() {
        const container = document.getElementById('habilidades-container');
        habilidades[esencia].forEach(hab => {
            const btn = document.createElement('button');
            btn.className = 'btn-habilidad border-2 border-yellow-500 p-3 m-2 w-4/5 text-yellow-500 font-bold uppercase';
            btn.innerText = hab;
            btn.onclick = realizarAtaque;
            container.appendChild(btn);
        });
    }

    function realizarAtaque() {
        let dano = Math.floor((stats[esencia] * 2) * multiplicadorDano);
        vidaEnemigo -= dano;
        if (vidaEnemigo < 0) vidaEnemigo = 0;
        document.getElementById('barra-enemigo').style.width = vidaEnemigo + '%';

        if (vidaEnemigo <= 0) {
            alert("¡VICTORIA! Tus stats han mejorado.");
            stats[esencia]++; // Aumenta tu esencia elegida
            localStorage.setItem('stats', JSON.stringify(stats));
            window.location.href = 'pantalla5.html';
        } else {
            setTimeout(turnoEnemigo, 500);
        }
    }

    function turnoEnemigo() {
        vidaJugador -= 15;
        document.getElementById('barra-jugador').style.width = Math.max(0, vidaJugador) + '%';
        if (vidaJugador <= 0) alert("DERROTA. Reintenta.");
    }
</script>
</body>
</html>
