<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: Entrenamiento</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/06e012f27cc8a6a49e529252620b5c76e1b1edfb/extensi%C3%B3n%20izquierda%20picante%20prime.jpg'); background-size: cover; background-position: center; touch-action: manipulation; }
        
        /* Tarjeta */
        #tarjeta-usuario { border: 3px solid #FFD700; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.8); margin-top: 20px; width: 280px; text-align: center; }
        #img-personaje { width: 140px; height: 140px; background: url('https://github.com/MrHOMERO/Los-takitos/raw/06e012f27cc8a6a49e529252620b5c76e1b1edfb/retouch_2026063003370289.png'); background-size: contain; background-repeat: no-repeat; margin: 0 auto; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; color: #FFD700; font-weight: bold; }

        /* Pantalla Final */
        #pantalla-final { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }

        /* Barras */
        #contenedor-barras { display: flex; gap: 20px; margin-top: auto; margin-bottom: 50px; }
        .barra-caja { width: 60px; height: 120px; background: rgba(0,0,0,0.7); border: 2px solid #00FFFF; position: relative; cursor: pointer; }
        .barra-progreso { position: absolute; bottom: 0; width: 100%; height: 0%; background: #00FFFF; transition: height 0.1s; }
        .timer-display { position: absolute; top: -30px; width: 100%; text-align: center; color: #FFF; font-size: 1.2rem; font-weight: bold; z-index: 10; }
        .nombre-habilidad { position: absolute; bottom: -35px; width: 100%; text-align: center; font-size: 0.6rem; color: #FFD700; text-transform: uppercase; }
        
        #reloj-central { position: fixed; top: 50%; font-size: 5rem; color: #FFD700; display: none; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

    <div id="tarjeta-usuario">
        <div id="img-personaje"></div>
        <h2 id="display-nombre">VIAJERO</h2>
        <div class="stats-row">
            <div>SAB<br><span id="val-sab">0</span></div>
            <div>INT<br><span id="val-int">0</span></div>
            <div>POD<br><span id="val-pod">0</span></div>
        </div>
    </div>

    <div id="pantalla-final">
        <h2 style="color:#FFD700; margin-bottom:30px;">¡MISIÓN COMPLETADA!</h2>
        <button onclick="window.location.href='resultado_tarjeta.html'" style="padding:15px 25px; margin:10px; cursor:pointer; background:#FFD700; border:none; font-weight:bold; border-radius:10px; width:260px;">¿QUIERES VER TU PROGRESO?</button>
        <button onclick="window.location.href='intro_mundo1.html'" style="padding:15px 25px; margin:10px; cursor:pointer; background:#00FFFF; border:none; font-weight:bold; border-radius:10px; width:260px;">CONTINUAR MISIÓN</button>
    </div>

    <div id="reloj-central"></div>

    <div id="contenedor-barras">
        <div class="barra-caja" onclick="iniciarSecuencia(0)"><div class="timer-display" id="t0"></div><div class="barra-progreso" id="b0"></div><div class="nombre-habilidad">SABIDURÍA</div></div>
        <div class="barra-caja" onclick="iniciarSecuencia(1)"><div class="timer-display" id="t1"></div><div class="barra-progreso" id="b1"></div><div class="nombre-habilidad">INTELIGENCIA</div></div>
        <div class="barra-caja" onclick="iniciarSecuencia(2)"><div class="timer-display" id="t2"></div><div class="barra-progreso" id="b2"></div><div class="nombre-habilidad">PODER</div></div>
    </div>

    <script>
        window.onload = () => {
            const stats = JSON.parse(localStorage.getItem('statsPersonaje')) || { sabiduria: 80, inteligencia: 60, poder: 40 };
            document.getElementById('val-sab').innerText = stats.sabiduria;
            document.getElementById('val-int').innerText = stats.inteligencia;
            document.getElementById('val-pod').innerText = stats.poder;
            document.getElementById('display-nombre').innerText = localStorage.getItem('nombreViajero') || "VIAJERO";
        };

        let niveles = [0,0,0], usadas = [false,false,false], barraActiva = -1;

        function iniciarSecuencia(idx) {
            if(usadas[idx] || barraActiva !== -1) return;
            let contador = 3;
            const reloj = document.getElementById('reloj-central');
            reloj.style.display = 'block';
            let id = setInterval(() => {
                reloj.innerText = contador > 0 ? contador : "¡YA!";
                if(contador === 0) {
                    clearInterval(id);
                    setTimeout(() => { reloj.style.display = 'none'; comenzarCuentaRegresiva(idx); }, 500);
                }
                contador--;
            }, 800);
        }

        function comenzarCuentaRegresiva(idx) {
            barraActiva = idx;
            let tiempo = 10;
            let timerDiv = document.getElementById('t' + idx);
            timerDiv.innerText = tiempo;
            
            let interval = setInterval(() => {
                tiempo--;
                timerDiv.innerText = tiempo > 0 ? tiempo : "";
                if(tiempo <= 0) { 
                    clearInterval(interval); barraActiva = -1; usadas[idx] = true; 
                    document.getElementById('b' + idx).style.background = 'red';
                    if(usadas.every(u => u)) {
                        localStorage.setItem('nivelesFinales', JSON.stringify(niveles));
                        document.getElementById('pantalla-final').style.display = 'flex';
                    }
                }
            }, 1000);
        }

        document.body.onclick = (e) => {
            if(barraActiva !== -1) {
                niveles[barraActiva] = Math.min(niveles[barraActiva] + 1, 100);
                document.getElementById('b' + barraActiva).style.height = niveles[barraActiva] + "%";
            }
        };
    </script>
</body>
</html>
