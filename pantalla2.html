<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elección del Destino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', Courier, monospace; color: #FFD700; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .opcion-boton {
            width: 80%; max-width: 400px; padding: 20px; margin: 15px;
            border: 2px solid #FFD700; border-radius: 15px;
            background: rgba(0,0,0,0.8); cursor: pointer; text-align: center;
            font-size: 1.2rem; transition: 0.3s;
        }
        .opcion-boton:hover { background: #FFD700; color: #000; }
    </style>
</head>
<body>

    <h1 class="text-2xl mb-10 text-center uppercase tracking-widest">¿Cuál es tu camino?</h1>

    <!-- Botones que redirigen a pantalla 3 -->
    <div class="opcion-boton" onclick="elegirCamino('camino1')">SABIDURÍA DE LAS ESTRELLAS</div>
    <div class="opcion-boton" onclick="elegirCamino('camino2')">SENDERO DEL GUERRERO</div>

    <script>
        function elegirCamino(camino) {
            // Guardamos la elección por si la necesitas más adelante
            localStorage.setItem('caminoElegido', camino);
            
            // Redirección directa a la página de personajes
            window.location.href = 'pantalla3.html';
        }
    </script>
</body>
</html>
