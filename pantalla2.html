<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Gran Elección</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .fondo-espacio {
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/espacio2.jpg') !important;
        }
    </style>
</head>
<body>
    <div class="fondo-espacio"></div>

    <audio autoplay loop>
        <source src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/c73eac72ee9c6726509c34557d8ced2d9a0b1fae/audiopantalla2.mp3" type="audio/mpeg">
    </audio>

    <div class="pantalla">
        <h2 class="titulo-juego">LA GRAN ELECCIÓN</h2>
        <p class="pregunta-texto">¿Cuál es la forma más sabia de gastar nuestro tiempo?</p>
        
        <!-- Botón 1: Sabiduría (Con la imagen que me acabas de pasar) -->
        <button class="boton-jugar" onclick="elegirEsencia('Sabiduría', 'https://github.com/MrHOMERO/Los-takitos/raw/b06b4f465cac4963d117067da82fb82d179051b9/retouch_2026063003370289.png')">
            Buscar la sabiduría
        </button>

        <!-- Botón 2: Legado -->
        <button class="boton-jugar" onclick="elegirEsencia('Legado', 'https://github.com/MrHOMERO/Los-takitos/raw/b06b4f465cac4963d117067da82fb82d179051b9/retouch_2026063003370289.png')">
            Construir un legado
        </button>

        <!-- Botón 3: Presente -->
        <button class="boton-jugar" onclick="elegirEsencia('Presente', 'https://raw.githubusercontent.com/MrHOMERO/Los-takitos/main/PERSONAJE_3_URL.png')">
            Vivir el momento
        </button>
    </div>

    <script src="juego.js"></script>
</body>
</html>
