<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Gran Elección</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; background: #000; font-family: 'Courier New', Courier, monospace; 
            color: #FFD700; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
            background-image: url('URL_DE_TU_FONDO_ESPACIO'); /* Opcional: tu fondo de estrellas */
            background-size: cover;
        }
        .contenedor-eleccion {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .boton-jugar { 
            display: block;
            width: 100%; padding: 18px; margin: 15px 0;
            background: #FFD700; border: none;
            color: #000; font-weight: bold; border-radius: 50px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
            font-size: 1.1rem;
        }
        .boton-jugar:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="contenedor-eleccion">
        <h1 class="text-2xl font-bold mb-6 uppercase">La Gran Elección</h1>
        <p class="mb-8">¿Cuál es la forma más sabia de gastar nuestro tiempo?</p>
        
        <!-- Botones que definen el camino -->
        <button class="boton-jugar" onclick="seleccionar('sabiduria')">Buscar la sabiduría</button>
        <button class="boton-jugar" onclick="seleccionar('legado')">Construir un legado</button>
        <button class="boton-jugar" onclick="seleccionar('momento')">Vivir el momento</button>
    </div>

    <script>
        function seleccionar(tipo) {
            // Guardamos el tipo para que pantalla3.html lo pueda leer
            localStorage.setItem('tipoElegido', tipo);
            
            // Redirigimos
            window.location.href = 'pantalla3.html';
        }
    </script>
</body>
</html>
