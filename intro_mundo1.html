<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciando Misión</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        
        #video-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }
        
        #video-intro { 
            width: 100%; height: 100%; 
            /* 'contain' asegura que todo el video se vea, sin recortes */
            object-fit: contain; display: block; 
        }

        .punto-mision {
            position: absolute;
            width: 12vw; height: 12vw;
            background: rgba(0, 255, 255, 0.15);
            border: 3px solid #00FFFF;
            border-radius: 50%;
            cursor: pointer;
            display: none; /* Ocultos hasta que el video termine */
            animation: pulso 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video-intro" playsinline autoplay muted>
            <source src="lv_0_20260704135348.mp4" type="video/mp4">
        </video>

        <button class="punto-mision" style="top: 52%; left: 19%;" onclick="irAMision('Sector A')"></button>
        <button class="punto-mision" style="top: 52%; left: 69%;" onclick="irAMision('Data Core B')"></button>
    </div>

    <script>
        const video = document.getElementById('video-intro');
        const botones = document.querySelectorAll('.punto-mision');

        video.onended = function() {
            // Mostrar los botones cuando el video termina
            botones.forEach(b => b.style.display = 'block');
        };

        function irAMision(mision) {
            // Guardamos la elección y vamos a la pantalla de la misión
            localStorage.setItem('misionElegida', mision);
            window.location.href = 'mision.html'; 
        }
    </script>
</body>
</html>
