<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Destino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', Courier, monospace; color: #FFD700; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .carta-personaje { background: rgba(0, 0, 0, 0.9); border: 3px solid #FFD700; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        .carta-img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 20px; border-radius: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; font-weight: bold; }
        .boton { margin-top: 20px; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 80%; border: none; }
        .boton-confirmar { background: #FFD700; color: #000; }
        .boton-retorno { background: #00FFFF; color: #000; }
    </style>
</head>
<body>

    <div class="carta-personaje">
        <img id="img-personaje" src="" class="carta-img" alt="Personaje">
        <div id="nombre-titulo" class="text-2xl font-bold text-white uppercase">---</div>
        <div class="stats-grid">
            <div>SAB<br><span id="stat-sab">0</span></div>
            <div>INT<br><span id="stat-int">0</span></div>
            <div>POD<br><span id="stat-pod">0</span></div>
        </div>
    </div>

    <div id="area-registro" class="w-full flex flex-col items-center">
        <input type="text" id="input-nombre" class="mt-8 p-3 w-4/5 rounded-lg text-black text-center" placeholder="Tu nombre de viajero...">
        <button class="boton boton-confirmar" onclick="guardarNombre()">Comenzar mi historia</button>
    </div>

    <button id="btn-retorno" class="boton boton-retorno hidden" onclick="window.location.href='intro_mundo1.html'">VOLVER A LA MISIÓN</button>

    <script>
        const tipo = localStorage.getItem('tipoElegido');
        const img = document.getElementById('img-personaje');
        const titulo = document.getElementById('nombre-titulo');
        const statSab = document.getElementById('stat-sab');
        const statInt = document.getElementById('stat-int');
        const statPod = document.getElementById('stat-pod');

        // 1. Cargar Stats
        const stats = JSON.parse(localStorage.getItem('statsPersonaje')) || { sabiduria: 0, inteligencia: 0, poder: 0 };
        
        // Asignar imágenes y textos
        if (tipo === 'sabiduria') {
            img.src = "https://github.com/MrHOMERO/Los-takitos/raw/b06b4f465cac4963d117067da82fb82d179051b9/retouch_2026063003370289.png";
            titulo.innerText = localStorage.getItem('nombreViajero') || "SABIDURÍA";
        } else if (tipo === 'legado') {
            img.src = "https://github.com/MrHOMERO/Los-takitos/raw/b24d92948c4c9e1969aa83a319c743107ae0191b/retouch_2026062821501359.png";
            titulo.innerText = localStorage.getItem('nombreViajero') || "LEGADO";
        } else {
            img.src = "https://github.com/MrHOMERO/Los-takitos/raw/958e43da5379b9ae62906f3d8dd32107c36990d1/retouch_2026070400133216.png";
            titulo.innerText = localStorage.getItem('nombreViajero') || "PRESENTE";
        }

        // 2. Mostrar Stats
        statSab.innerText = stats.sabiduria > 0 ? stats.sabiduria : (tipo === 'sabiduria' ? 80 : (tipo === 'legado' ? 40 : 50));
        statInt.innerText = stats.inteligencia > 0 ? stats.inteligencia : (tipo === 'sabiduria' ? 60 : (tipo === 'legado' ? 70 : 50));
        statPod.innerText = stats.poder > 0 ? stats.poder : (tipo === 'sabiduria' ? 40 : (tipo === 'legado' ? 70 : 80));

        // 3. Lógica de registro corregida
        function guardarNombre() {
            const nombre = document.getElementById('input-nombre').value;
            if(nombre) {
                localStorage.setItem('nombreViajero', nombre);
                localStorage.setItem('statsPersonaje', JSON.stringify({
                    sabiduria: parseInt(statSab.innerText),
                    inteligencia: parseInt(statInt.innerText),
                    poder: parseInt(statPod.innerText)
                }));
                // Redirección directa a pantalla 4
                window.location.href = 'pantalla4.html';
            } else {
                alert("Por favor, ingresa un nombre para continuar.");
            }
        }

        // 4. Comprobación inicial (oculta el registro si ya tiene nombre)
        if(localStorage.getItem('nombreViajero')) {
            document.getElementById('area-registro').classList.add('hidden');
            document.getElementById('btn-retorno').classList.remove('hidden');
        }
    </script>
</body>
</html>
