<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido, Viajero</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste para que el personaje se vea grande y centrado */
        .carta-personaje {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 25px;
            margin: 10px auto;
            width: 85%; /* Más grande */
            max-width: 400px;
            color: #FFD700;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }
        .carta-img { 
            width: 100%; 
            max-height: 250px; /* Personaje más grande */
            object-fit: contain; 
            margin-bottom: 15px; 
        }
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            font-size: 1.1rem; 
            margin: 15px 0;
            font-weight: bold;
        }
        .btn-seleccion { 
            background: #222; color: #FFD700; border: 2px solid #FFD700; 
            padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 5px;
        }
        #input-nombre { width: 80%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="fondo-espacio"></div>

    <div class="pantalla">
        <h2 class="titulo-juego">BIENVENIDO, VIAJERO</h2>

        <div id="carta-visual" class="carta-personaje">
            <img id="img-personaje" src="https://github.com/MrHOMERO/Los-takitos/raw/b06b4f465cac4963d117067da82fb82d179051b9/retouch_2026063003370289.png" class="carta-img">
            <h3 id="nombre-personaje" style="margin: 0;">Tu Esencia</h3>
            <div class="stats-grid">
                <div>SAB<br><span id="val-sab">50</span></div>
                <div>INT<br><span id="val-int">50</span></div>
                <div>POD<br><span id="val-pod">50</span></div>
            </div>
        </div>

        <div id="botones-personajes">
            <button class="btn-seleccion" onclick="elegir('Sabiduría')">Sabiduría</button>
            <button class="btn-seleccion" onclick="elegir('Legado')">Legado</button>
            <button class="btn-seleccion" onclick="elegir('Presente')">Presente</button>
        </div>

        <p class="pregunta-texto" style="margin-top: 20px;">¿Cómo te llaman en los registros del tiempo?</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre...">
        <button class="boton-jugar" onclick="confirmar()">Comenzar mi historia</button>
    </div>

    <script>
        function elegir(esencia) {
            localStorage.setItem('esencia', esencia);
            document.getElementById('nombre-personaje').innerText = esencia;
            // Aquí puedes personalizar los stats por personaje si lo deseas
        }

        function confirmar() {
            const nombre = document.getElementById('input-nombre').value;
            if(nombre) {
                localStorage.setItem('nombre', nombre);
                window.location.href = 'pantalla4.html';
            } else {
                alert("Por favor, ingresa tu nombre.");
            }
        }
    </script>
</body>
</html>
