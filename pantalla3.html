<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidad Confirmada</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo para que la imagen se vea perfecta y circular */
        #img-personaje-usuario {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
            object-fit: cover; /* Asegura que la imagen no se deforme */
        }
    </style>
</head>
<body>
    <div class="fondo-espacio"></div>

    <div class="pantalla">
        <h2 class="titulo-juego">IDENTIDAD CONFIRMADA</h2>

        <!-- Aquí es donde aparecerá el personaje elegido -->
        <div id="contenedor-personaje">
            <img id="img-personaje-usuario" src="" alt="Tu Personaje">
        </div>

        <p class="pregunta-texto">Dinos, viajero, ¿cómo te llaman en los registros del tiempo?</p>
        
        <input type="text" id="input-nombre" class="boton-jugar" placeholder="Ingresa tu nombre..." style="background: white; color: black;">
        
        <button class="boton-jugar" onclick="confirmarNombre()">Comenzar mi historia</button>
    </div>

    <script src="juego.js"></script>
    <script>
        // Esta línea es la que hace la magia: al cargar, busca la imagen guardada
        window.onload = function() {
            aplicarImagenPersonaje();
        };
    </script>
</body>
</html>
