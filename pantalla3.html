<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido, Viajero</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tus estilos actuales */
        .carta-personaje {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 30px; /* Aumentado */
            margin: 30px auto; /* Aumentado */
            width: 90%;
            max-width: 450px; /* Aumentado */
            color: #FFD700;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }
        .carta-img { 
            width: 100%; 
            max-height: 350px; /* Personaje más grande */
            object-fit: contain; 
            margin-bottom: 20px; 
        }
        .nombre-esencia { font-size: 2rem; margin: 10px 0; color: #FFF; }
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            font-size: 1.3rem; 
            margin: 25px 0;
            font-weight: bold;
        }
    </style>
</head>
<body onload="inicializar()">
    <div class="fondo-espacio"></div>

    <div class="pantalla">
        <h2 class="titulo-juego">BIENVENIDO, VIAJERO</h2>

        <div id="carta-visual" class="carta-personaje">
            <img id="img-personaje" src="https://github.com/MrHOMERO/Los-takitos/raw/b06b4f465cac4963d117067da82fb82d179051b9/retouch_2026063003370289.png" class="carta-img">
            <div class="nombre-esencia">SABIDURÍA</div>
            <div class="stats-grid">
                <div>SAB<br>50</div>
                <div>INT<br>50</div>
                <div>POD<br>50</div>
            </div>
        </div>

        <p class="pregunta-texto">¿Cómo te llaman en los registros del tiempo?</p>
        <input type="text" id="input-nombre" class="boton-jugar" placeholder="Tu nombre..." style="background: white; color: black;">
        
        <!-- Cambiado a confirmarNombre() para usar la lógica centralizada de juego.js -->
        <button class="boton-jugar" onclick="confirmarNombre()">Comenzar mi historia</button>
    </div>

    <script>
        function inicializar() {
            localStorage.setItem('esencia', 'Sabiduría');
            localStorage.setItem('sab', 50);
            localStorage.setItem('int', 50);
            localStorage.setItem('pod', 50);
        }
    </script>
    
    <!-- Este script es el único que debe ir al final -->
    <script src="juego.js"></script>
</body>
</html>
