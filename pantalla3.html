<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Viaje Comienza</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo específico para la presentación del personaje en esta pantalla */
        #contenedor-personaje {
            margin-bottom: 30px;
            text-align: center;
        }
        #img-personaje-usuario {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .input-nombre {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            width: 250px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="fondo-espacio"></div>

    <div class="pantalla">
        <h2 class="titulo-juego">IDENTIDAD CONFIRMADA</h2>
        
        <!-- Aquí aparecerá el personaje elegido -->
        <div id="contenedor-personaje">
            <img id="img-personaje-usuario" src="" alt="Tu Personaje">
        </div>

        <p class="pregunta-texto">Dinos, viajero, ¿cómo te llaman en los registros del tiempo?</p>
        
        <input type="text" id="input-nombre" class="input-nombre" placeholder="Ingresa tu nombre...">
        
        <button class="boton-jugar" onclick="confirmarNombre()">Comenzar mi historia</button>
    </div>

    <!-- Cargamos tu archivo juego.js que ya tiene la lógica actualizada -->
    <script src="juego.js"></script>
    <script>
        // Al cargar la página, inyectamos la imagen desde localStorage
        window.onload = function() {
            aplicarImagenPersonaje();
        };
    </script>
</body>
</html>
