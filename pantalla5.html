<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Conocimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center top;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        #titulo-mapa {
            margin-top: 5%; color: #FFD700; font-size: 1.8rem; font-weight: bold;
            text-shadow: 0 0 15px #FFD700; text-transform: uppercase; z-index: 20;
        }

        .planeta {
            position: absolute; width: 75px; height: 75px; border-radius: 50%;
            background-size: 200% 100%; cursor: pointer; z-index: 5;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: rotar 10s linear infinite;
        }
        
        @keyframes rotar { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }

        #dialogo-planeta {
            position: fixed; display: none; background: rgba(0, 0, 0, 0.95);
            border: 2px solid #FFD700; color: #FFF; padding: 20px; border-radius: 15px;
            z-index: 30; font-size: 1rem; width: 85%; max-width: 350px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); text-align: center;
        }

        .btn-comenzar {
            display: block; width: 100%; padding: 12px; margin-top: 20px;
            background: #FFD700; color: #000; font-weight: bold; border-radius: 5px;
            cursor: pointer; text-transform: uppercase; border: none;
        }
    </style>
</head>
<body onclick="activarMusica()">

<audio id="musica-mapa" loop>
    <source src="https://github.com/MrHOMERO/Los-takitos/raw/5ccbc797e782bc7c36acefb6d47a7c877ca62fe8/musicafondomapa.mp3" type="audio/mpeg">
</audio>

<div id="app">
    <h1 id="titulo-mapa">Elige tu destino</h1>
    <div id="dialogo-planeta" onclick="event.stopPropagation()"></div>

    <div id="p1" class="planeta" data-nombre="ECOS DEL PASADO" data-misiones="1. Decodificar Ecos<br>2. Cazar al Silenciador" style="top: 25%; left: 15%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg');" onclick="gestionarClic(event, 'p1')"></div>
    <div id="p2" class="planeta" data-nombre="VALLE ANALÓGICO" data-misiones="1. Sintonizar Realidad<br>2. Derrotar al Sofista" style="top: 25%; left: 45%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg');" onclick="gestionarClic(event, 'p2')"></div>
    <div id="p3" class="planeta" data-nombre="ARCHIVO FLOTANTE" data-misiones="1. Recuperar Datos<br>2. Frenar al Archivista" style="top: 25%; left: 75%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg');" onclick="gestionarClic(event, 'p3')"></div>

    <div id="p4" class="planeta" data-nombre="LABERINTO DE VIDRIO" data-misiones="1. Enfrentar Espejos<br>2. Vencer a tu Sombra" style="top: 38%; left: 15%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg');" onclick="gestionarClic(event, 'p4')"></div>
    <div id="p5" class="planeta" data-nombre="VACÍO DE VERDADES" data-misiones="1. Estabilizar Concepto<br>2. Desafiar al Guardián" style="top: 38%; left: 45%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg');" onclick="gestionarClic(event, 'p5')"></div>
    <div id="p6" class="planeta" data-nombre="TRONO DEL OLVIDO" data-misiones="1. Reclamar Memoria<br>2. Confrontar a MALAKAI" style="top: 38%; left: 75%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg');" onclick="gestionarClic(event, 'p6')"></div>
</div>

<script>
    function activarMusica() {
        const audio = document.getElementById('musica-mapa');
        audio.volume = 0.4; // Volumen al 40%
        audio.play().catch(() => {});
    }

    function gestionarClic(e, id) {
        e.stopPropagation();
        const p = document.getElementById(id);
        const diag = document.getElementById('dialogo-planeta');
        diag.innerHTML = `
            <h2 class="text-xl mb-4 text-yellow-400 font-bold">${p.dataset.nombre}</h2>
            <div class="text-left text-xs mb-4">${p.dataset.misiones}</div>
            <button class="btn-comenzar" onclick="iniciarMision('${id}')">Comenzar Misión</button>
        `;
        diag.style.display = 'block';
    }

    function iniciarMision(id) {
        localStorage.setItem('planetaActual', id);
        window.location.href = 'intro_mundo1.html'; 
    }

    // Cierra el diálogo al hacer clic fuera
    document.body.addEventListener('click', () => {
        document.getElementById('dialogo-planeta').style.display = 'none';
    });
</script>
</body>
</html>
