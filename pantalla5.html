<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Conocimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            position: relative; display: flex; flex-direction: column; align-items: center;
        }

        #titulo-mapa {
            margin-top: 5%; /* Posicionado en el primer cuarto superior */
            color: #FFD700; font-size: 2rem; font-weight: bold;
            text-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700;
            text-transform: uppercase; letter-spacing: 3px; z-index: 20;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        .planeta {
            position: absolute; width: 80px; height: 80px; border-radius: 50%;
            background-size: cover; cursor: pointer; z-index: 5;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .planeta:hover { transform: scale(1.2); }
        .activo { border: 4px solid #FFF; box-shadow: 0 0 20px #FFF; }

        /* Posiciones fijas */
        #p1 { top: 25%; left: 10%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg'); }
        #p2 { top: 40%; left: 25%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg'); }
        #p3 { top: 25%; left: 40%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg'); }
        #p4 { top: 40%; left: 55%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg'); }
        #p5 { top: 25%; left: 70%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg'); }
        #p6 { top: 40%; left: 85%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg'); }
    </style>
</head>
<body>

<div id="app">
    <h1 id="titulo-mapa">Elige tu destino</h1>
    <div id="cabina-capa"></div>

    <!-- Planetas -->
    <div id="p1" class="planeta" data-nombre="ECOS DEL PASADO" data-misiones="1. Decodificar Ecos | 2. Cazar al Silenciador" onclick="gestionarClic('p1')"></div>
    <div id="p2" class="planeta" data-nombre="VALLE ANALÓGICO" data-misiones="1. Sintonizar Realidad | 2. Derrotar al Sofista" onclick="gestionarClic('p2')"></div>
    <div id="p3" class="planeta" data-nombre="ARCHIVO FLOTANTE" data-misiones="1. Recuperar Datos | 2. Frenar al Archivista" onclick="gestionarClic('p3')"></div>
    <div id="p4" class="planeta" data-nombre="LABERINTO DE VIDRIO" data-misiones="1. Enfrentar Espejos | 2. Vencer a tu Sombra" onclick="gestionarClic('p4')"></div>
    <div id="p5" class="planeta" data-nombre="VACÍO DE VERDADES" data-misiones="1. Estabilizar Concepto | 2. Desafiar al Guardián" onclick="gestionarClic('p5')"></div>
    <div id="p6" class="planeta" data-nombre="TRONO DEL OLVIDO" data-misiones="1. Reclamar Memoria | 2. Confrontar a MALAKAI" onclick="gestionarClic('p6')"></div>
</div>

<script>
    // Precarga automática de imágenes
    const imagenes = ['https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg','https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg','https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg','https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg','https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg','https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg'];
    imagenes.forEach(url => { new Image().src = url; });

    let clickCount = {};

    function gestionarClic(id) {
        const p = document.getElementById(id);
        if (!clickCount[id]) {
            document.querySelectorAll('.planeta').forEach(el => el.classList.remove('activo'));
            p.classList.add('activo');
            clickCount = {};
            clickCount[id] = 1;
            alert("Misión en " + p.dataset.nombre + ":\n" + p.dataset.misiones.replace(/ \| /g, "\n") + "\n\n(Toca de nuevo para entrar)");
        } else {
            localStorage.setItem('planetaActual', id);
            window.location.href = 'mision.html';
        }
    }
</script>

</body>
</html>
