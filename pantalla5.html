<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Conocimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        #titulo-mapa {
            margin-top: 5%; color: #FFD700; font-size: 2rem; font-weight: bold;
            text-shadow: 0 0 15px #FFD700; text-transform: uppercase; z-index: 20;
            white-space: nowrap; overflow: hidden; max-width: 90vw;
        }

        .planeta {
            position: absolute; width: 80px; height: 80px; border-radius: 50%;
            background-size: 200% 100%; cursor: pointer; z-index: 5;
            transition: transform 0.3s;
            animation: rotar 10s linear infinite;
        }
        
        @keyframes rotar { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }

        #dialogo-planeta {
            position: absolute; display: none; background: rgba(0, 0, 0, 0.95);
            border: 2px solid #FFD700; color: #FFF; padding: 15px; border-radius: 10px;
            z-index: 30; font-size: 0.9rem; width: 220px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body onclick="cerrarDialogo()">

<div id="app">
    <h1 id="titulo-mapa">Elige tu destino</h1>
    <div id="dialogo-planeta" onclick="event.stopPropagation()"></div>

    <!-- Planetas -->
    <div id="p1" class="planeta" data-nombre="ECOS DEL PASADO" data-desc="Un mundo lleno de ecos de voces antiguas." data-misiones="1. Decodificar Ecos<br>2. Cazar al Silenciador" style="top: 25%; left: 10%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg');" onclick="gestionarClic(event, 'p1')"></div>
    <div id="p2" class="planeta" data-nombre="VALLE ANALÓGICO" data-desc="El origen del flujo de datos primario." data-misiones="1. Sintonizar Realidad<br>2. Derrotar al Sofista" style="top: 40%; left: 25%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg');" onclick="gestionarClic(event, 'p2')"></div>
    <div id="p3" class="planeta" data-nombre="ARCHIVO FLOTANTE" data-desc="Fragmentos de historia en deriva." data-misiones="1. Recuperar Datos<br>2. Frenar al Archivista" style="top: 25%; left: 40%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg');" onclick="gestionarClic(event, 'p3')"></div>
    <div id="p4" class="planeta" data-nombre="LABERINTO DE VIDRIO" data-misiones="1. Enfrentar Espejos<br>2. Vencer a tu Sombra" data-desc="Donde la luz se quiebra." style="top: 40%; left: 55%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg');" onclick="gestionarClic(event, 'p4')"></div>
    <div id="p5" class="planeta" data-nombre="VACÍO DE VERDADES" data-misiones="1. Estabilizar Concepto<br>2. Desafiar al Guardián" data-desc="El lugar donde todo nace." style="top: 25%; left: 70%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg');" onclick="gestionarClic(event, 'p5')"></div>
    <div id="p6" class="planeta" data-nombre="TRONO DEL OLVIDO" data-misiones="1. Reclamar Memoria<br>2. Confrontar a MALAKAI" data-desc="El final de toda travesía." style="top: 40%; left: 85%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg');" onclick="gestionarClic(event, 'p6')"></div>
</div>

<script>
    const imagenes = ['picante.jpg','maiz.jpg','tortillas.jpg','sal.jpg','cilantro.jpg','limon.jpg'];
    imagenes.forEach(img => { new Image().src = 'https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/' + img; });

    let clickCount = {};

    function gestionarClic(e, id) {
        e.stopPropagation();
        const p = document.getElementById(id);
        const diag = document.getElementById('dialogo-planeta');

        if (!clickCount[id]) {
            diag.innerHTML = `<strong>${p.dataset.nombre}</strong><br><small>${p.dataset.desc}</small><br><br>${p.dataset.misiones}<br><br><span style="color:#FFD700">Toca de nuevo para entrar</span>`;
            diag.style.display = 'block';
            diag.style.left = (e.clientX + 20) + 'px';
            diag.style.top = (e.clientY + 20) + 'px';
            clickCount = {};
            clickCount[id] = 1;
        } else {
            localStorage.setItem('planetaActual', id);
            window.location.href = 'mision.html';
        }
    }

    function cerrarDialogo() {
        document.getElementById('dialogo-planeta').style.display = 'none';
        clickCount = {};
    }
</script>
</body>
</html>
