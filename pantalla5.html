<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        /* Aplicamos el filtro de realismo a todas las imágenes */
        .img-panoramica {
            width: 100%; height: 100%; object-fit: cover;
            filter: contrast(1.15) saturate(1.2) brightness(0.95);
        }

        /* Puntos verdes de interés (inicialmente ocultos) */
        .punto-interes {
            position: absolute; width: 20px; height: 20px;
            background-color: #00ff00; border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            display: none; cursor: pointer; z-index: 100;
        }
        
        /* Posiciones aproximadas sobre los cristales */
        #punto-izq { top: 45%; left: 30%; } /* Ajusta según tu imagen izquierda */
        #punto-der { top: 45%; left: 70%; } /* Ajusta según tu imagen derecha */
    </style>
</head>
<body>

<!-- ... (mismo contenedor anterior) ... -->

<div id="contenedor-panoramico">
    <!-- Izquierda con punto -->
    <div class="seccion">
        <img src="..." class="img-panoramica">
        <div id="punto-izq" class="punto-interes"></div>
    </div>
    
    <!-- Centro -->
    <div class="seccion">
        <img src="..." class="img-panoramica">
        <img src="..." class="personaje-wrapper respiracion" onclick="iniciarExperiencia()">
    </div>
    
    <!-- Derecha con punto -->
    <div class="seccion">
        <img src="..." class="img-panoramica">
        <div id="punto-der" class="punto-interes"></div>
    </div>
</div>

<script>
    function iniciarExperiencia() {
        // ... (código existente de sonido y mensaje) ...
        
        // Activamos los puntos verdes
        document.getElementById('punto-izq').style.display = 'block';
        document.getElementById('punto-der').style.display = 'block';
    }
</script>
</body>
</html>
