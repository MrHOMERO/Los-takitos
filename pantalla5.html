<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikante-Prime - Exploración</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #contenedor-panoramico { display: flex; height: 100vh; width: 300vw; overflow-x: auto; scroll-behavior: smooth; }
        .seccion { position: relative; flex: 1; height: 100vh; overflow: hidden; }

        /* Estilo con filtros de textura y brillo */
        .img-panoramica { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: contrast(1.15) saturate(1.2) brightness(0.95); 
        }

        /* Personaje */
        .personaje-wrapper {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            height: 90vh; z-index: 10; cursor: pointer;
        }
        .respiracion { animation: respirar 3s infinite ease-in-out; }
        @keyframes respirar { 0%, 100% { transform: scale(1) translateX(-50%) translateY(0); } 50% { transform: scale(1.02) translateX(-49%) translateY(-5px); } }

        /* Puntos Verdes (Ocultos inicialmente) */
        .punto-interes {
            position: absolute; width: 25px; height: 25px;
            background-color: #00ff00; border-radius: 50%;
            box-shadow: 0 0 15px #00ff00; display: none; 
            cursor: pointer; z-index: 20; border: 2px solid white;
        }
        #punto-izq { top: 40%; left: 30%; } 
        #punto-der { top: 40%; left: 70%; }

        #mensaje-inicio {
            position: fixed; top: 30%; width: 100%; text-align: center;
            color: white; font-size: 1.5rem; z-index: 20; pointer-events: none;
            text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>

<div id="mensaje-inicio">TOCA AL PERSONAJE PARA COMENZAR A EXPLORAR</div>

<div id="contenedor-panoramico">
    <!-- Izquierda -->
    <div class="seccion">
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/b88f4bf419a761d062e848c8625c311eb14ca764/extensi%C3%B3n%20izquierda%20picante%20prime.jpg" class="img-panoramica">
        <div id="punto-izq" class="punto-interes"></div>
    </div>
    
    <!-- Centro -->
    <div class="seccion">
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/e1aad52480135ea17878c35a8be37dde19aecb12/fondopantalla5%20(1).jpeg" class="img-panoramica">
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/f3b25f548f8da3203ec3b98fb4fbc8beaf44634f/retouch_2026070100544560.png" 
             class="personaje-wrapper respiracion" onclick="iniciarExperiencia()" alt="Personaje">
    </div>
    
    <!-- Derecha -->
    <div class="seccion">
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/b88f4bf419a761d062e848c8625c311eb14ca764/extensi%C3%B3n%20derecha%20picante%20prime.jpg" class="img-panoramica">
        <div id="punto-der" class="punto-interes"></div>
    </div>
</div>

<audio id="sonido-fondo" src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/68ff4ef040fa62192b4246f69799117d569aff46/sonido%20picante%20prime.mp3"></audio>

<script>
    // Centrar al cargar
    window.onload = function() {
        document.getElementById('contenedor-panoramico').scrollLeft = window.innerWidth;
    };

    function iniciarExperiencia() {
        document.getElementById('sonido-fondo').play();
        document.getElementById('mensaje-inicio').style.display = 'none';
        
        // Activar los puntos verdes
        document.getElementById('punto-izq').style.display = 'block';
        document.getElementById('punto-der').style.display = 'block';
    }
</script>
</body>
</html>
