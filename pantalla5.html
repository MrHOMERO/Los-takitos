<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikante-Prime - Exploración</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #contenedor-panoramico {
            display: flex; height: 100vh; width: 300vw; 
            overflow-x: auto; scroll-behavior: smooth;
        }

        .seccion { position: relative; flex: 1; height: 100vh; background-size: cover; background-position: center; }

        /* Personaje y su área de clic invisible */
        .personaje-wrapper {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            height: 90vh; z-index: 10; cursor: pointer;
        }
        .respiracion { animation: respirar 3s infinite ease-in-out; }
        @keyframes respirar { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.01) translateY(-5px); } }

        /* Mensaje inicial */
        #mensaje-inicio {
            position: fixed; top: 30%; width: 100%; text-align: center;
            color: white; font-size: 1.5rem; z-index: 20; pointer-events: none;
            text-shadow: 2px 2px 4px black;
        }

        .flecha { position: fixed; top: 50%; z-index: 50; font-size: 3rem; color: cyan; cursor: pointer; animation: parpadeo 1.5s infinite; text-shadow: 0 0 10px black; }
        .flecha-izq { left: 20px; } .flecha-der { right: 20px; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body onload="centrarVista()">

<div id="mensaje-inicio">TOCA AL PERSONAJE PARA COMENZAR A EXPLORAR</div>

<!-- Botón invisible/interactivo sobre el personaje -->
<div id="contenedor-panoramico">
    <div class="seccion" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/b88f4bf419a761d062e848c8625c311eb14ca764/extensi%C3%B3n%20izquierda%20picante%20prime.jpg');"></div>
    
    <div class="seccion" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/e1aad52480135ea17878c35a8be37dde19aecb12/fondopantalla5%20(1).jpeg');">
        <!-- El personaje hace de botón -->
        <img src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/f3b25f548f8da3203ec3b98fb4fbc8beaf44634f/retouch_2026070100544560.png" 
             class="personaje-wrapper respiracion" onclick="iniciarExperiencia()" alt="Personaje">
    </div>
    
    <div class="seccion" style="background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/b88f4bf419a761d062e848c8625c311eb14ca764/extensi%C3%B3n%20derecha%20picante%20prime.jpg');"></div>
</div>

<audio id="sonido-fondo" src="https://raw.githubusercontent.com/MrHOMERO/Los-takitos/68ff4ef040fa62192b4246f69799117d569aff46/sonido%20picante%20prime.mp3"></audio>

<script>
    function centrarVista() {
        const contenedor = document.getElementById('contenedor-panoramico');
        contenedor.scrollLeft = window.innerWidth;
    }

    function iniciarExperiencia() {
        const sonido = document.getElementById('sonido-fondo');
        const mensaje = document.getElementById('mensaje-inicio');
        
        sonido.play();
        mensaje.style.display = 'none'; // Ocultamos el mensaje al tocar
        
        // Aquí podrías añadir lógica para mostrar las flechas si quieres que aparezcan recién al iniciar
    }
</script>
</body>
</html>
