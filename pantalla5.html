<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Conocimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        .planeta {
            position: absolute; width: 80px; height: 80px; /* Un poco más grandes */
            border-radius: 50%; background-size: cover;
            cursor: pointer;
            animation: rotar 20s linear infinite;
            z-index: 5;
            transition: transform 0.3s;
            /* Se eliminó el borde amarillo */
        }
        .planeta:hover { transform: scale(1.2); }
        
        @keyframes rotar { from { background-position: 0% 0%; } to { background-position: 200% 0%; } }

        /* Se eliminaron las líneas .linea */

        #tooltip {
            position: absolute; display: none; background: rgba(0, 0, 0, 0.9);
            border: 1px solid #FFD700; color: #FFD700; padding: 10px;
            border-radius: 8px; font-size: 0.8rem; pointer-events: none;
            z-index: 20; text-align: center;
        }

        /* Posiciones fijas sin líneas */
        #p1 { top: 25%; left: 10%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg'); }
        #p2 { top: 40%; left: 25%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg'); }
        #p3 { top: 25%; left: 40%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg'); }
        #p4 { top: 40%; left: 55%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg'); }
        #p5 { top: 25%; left: 70%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg'); }
        #p6 { top: 40%; left: 85%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg'); }
    </style>
</head>
<body>

<div id="app">
    <div id="cabina-capa"></div>
    <div id="tooltip"></div>

    <!-- Planetas con nuevos nombres y misiones -->
    <div id="p1" class="planeta" data-nombre="ECOS DEL PASADO" data-misiones="1. Decodificar Ecos<br>2. Cazar al Silenciador" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p1')"></div>
    <div id="p2" class="planeta" data-nombre="VALLE ANALÓGICO" data-misiones="1. Sintonizar Realidad<br>2. Derrotar al Sofista" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p2')"></div>
    <div id="p3" class="planeta" data-nombre="ARCHIVO FLOTANTE" data-misiones="1. Recuperar Datos<br>2. Frenar al Archivista" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p3')"></div>
    <div id="p4" class="planeta" data-nombre="LABERINTO DE VIDRIO" data-misiones="1. Enfrentar Espejos<br>2. Vencer a tu Sombra" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p4')"></div>
    <div id="p5" class="planeta" data-nombre="VACÍO DE VERDADES" data-misiones="1. Estabilizar Concepto<br>2. Desafiar al Guardián" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p5')"></div>
    <div id="p6" class="planeta" data-nombre="TRONO DEL OLVIDO" data-misiones="1. Reclamar Memoria<br>2. Confrontar a MALAKAI" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('p6')"></div>
</div>

<script>
    const tooltip = document.getElementById('tooltip');

    function mostrarTooltip(e) {
        const p = e.target;
        tooltip.innerHTML = `<strong>${p.dataset.nombre}</strong><br>${p.dataset.misiones}`;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.pageX + 10) + 'px';
        tooltip.style.top = (e.pageY - 60) + 'px';
    }

    function ocultarTooltip() {
        tooltip.style.display = 'none';
    }

    function irMision(nombrePlaneta) {
        localStorage.setItem('planetaActual', nombrePlaneta);
        window.location.href = 'mision.html';
    }
</script>

<script src="juego.js"></script>
</body>
</html>
