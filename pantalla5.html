<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Conocimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #app {
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/MrHOMERO/Los-takitos/69e9fcf7e0cb94f8660692c4b6eb8efe77e9307d/fondomapa%20(1).jpg');
            background-size: cover; background-position: center;
            position: relative;
        }

        #cabina-capa {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('watermarked_img_5533350620813538015.png');
            background-size: cover; pointer-events: none; z-index: 10;
        }

        .planeta {
            position: absolute; width: 70px; height: 70px;
            border-radius: 50%; background-size: cover;
            border: 2px solid #FFD700; cursor: pointer;
            animation: rotar 20s linear infinite;
            z-index: 5;
            transition: transform 0.3s;
        }
        .planeta:hover { transform: scale(1.2); }
        
        @keyframes rotar { from { background-position: 0% 0%; } to { background-position: 200% 0%; } }

        .linea { position: absolute; height: 3px; background: white; z-index: 2; transform-origin: left center; }

        #tooltip {
            position: absolute; display: none; background: rgba(0, 0, 0, 0.9);
            border: 1px solid #FFD700; color: #FFD700; padding: 10px;
            border-radius: 8px; font-size: 0.8rem; pointer-events: none;
            z-index: 20; text-align: center;
        }

        /* Posiciones en Zigzag */
        #p1 { top: 25%; left: 10%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/picante.jpg'); }
        #p2 { top: 40%; left: 25%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/maiz.jpg'); }
        #p3 { top: 25%; left: 40%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/tortillas.jpg'); }
        #p4 { top: 40%; left: 55%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/sal.jpg'); }
        #p5 { top: 25%; left: 70%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/cilantro.jpg'); }
        #p6 { top: 40%; left: 85%; background-image: url('https://github.com/MrHOMERO/Los-takitos/raw/dfadbb2921f6bfd06ccbd607dfbd74f6d62132df/limon.jpg'); }
    </style>
</head>
<body>

<div id="app">
    <div id="cabina-capa"></div>
    <div id="tooltip"></div>

    <!-- Líneas de conexión -->
    <div class="linea" style="top: 32%; left: 14%; width: 17%; transform: rotate(45deg);"></div>
    <div class="linea" style="top: 32%; left: 29%; width: 17%; transform: rotate(-45deg);"></div>
    <div class="linea" style="top: 32%; left: 44%; width: 17%; transform: rotate(45deg);"></div>
    <div class="linea" style="top: 32%; left: 59%; width: 17%; transform: rotate(-45deg);"></div>
    <div class="linea" style="top: 32%; left: 74%; width: 17%; transform: rotate(45deg);"></div>

    <!-- Planetas -->
    <div id="p1" class="planeta" data-nombre="PICANTE" data-misiones="1. Fuego Solar<br>2. Cenizas Eternas" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('picante')"></div>
    <div id="p2" class="planeta" data-nombre="MAÍZ" data-misiones="1. Cosecha Dorada<br>2. Raíces Ancestrales" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('maiz')"></div>
    <div id="p3" class="planeta" data-nombre="TORTILLAS" data-misiones="1. Masa Estelar<br>2. Fuego de Comal" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('tortillas')"></div>
    <div id="p4" class="planeta" data-nombre="SAL" data-misiones="1. Cristales de Mar<br>2. Sed del Desierto" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('sal')"></div>
    <div id="p5" class="planeta" data-nombre="CILANTRO" data-misiones="1. Aroma del Velo<br>2. Frescura Galáctica" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('cilantro')"></div>
    <div id="p6" class="planeta" data-nombre="LIMÓN" data-misiones="1. Acidez Infinita<br>2. Pulpa de Energía" onmouseover="mostrarTooltip(event)" onmouseout="ocultarTooltip()" onclick="irMision('limon')"></div>
</div>

<script>
    const tooltip = document.getElementById('tooltip');

    function mostrarTooltip(e) {
        const p = e.target;
        tooltip.innerHTML = `<strong>${p.dataset.nombre}</strong><br>${p.dataset.misiones}`;
        tooltip.style.display = 'block';
        // Ajuste para evitar que el tooltip se salga de pantalla
        tooltip.style.left = (e.pageX + 10) + 'px';
        tooltip.style.top = (e.pageY - 60) + 'px';
    }

    function ocultarTooltip() {
        tooltip.style.display = 'none';
    }

    function irMision(nombrePlaneta) {
        // Guardamos el planeta actual para que la siguiente pantalla sepa cuál es
        localStorage.setItem('planetaActual', nombrePlaneta);
        
        // Redirigimos al archivo puente
        window.location.href = 'mision.html';
    }
</script>

<script src="juego.js"></script>
</body>
</html>
